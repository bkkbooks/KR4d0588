front:
  text: 蟻術詩選目録
  hash: sha256:62e0b74f347dab1512d244b2a81f783391c20362170830f2da74539f18c56425
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0588_SBCK_000-1a}
body:
  text: 一卷五言古風秋懷次韻王彥強監稅中秋不見月又次九日韻夏夜夜謁青龍文廟和孫果育先生曉行池上韻晚望五側體齋居讀書效晦菴先生體二首早春次陸伯弘韻陳元茂别去十年扁舟由山隂來有詩敘懷次韻識喜二首用上人萬玉軒上武陽太守汪公國良公新安人善文詞書翰次宇文子貞别駕見貽韻熏自聞上人禪房與陸伯弘暮坐偶成全真師鄭無用北遊午日曹雲西翁厚堂分韻玉字秋懷擬古用黃伯成韻黃仲珍會試回潘省中有詩留别沙德潤任以南皆次韻持來求豫著語德潤以南又賦以適逺興再和為答贈經筵檢討太原陳敏夫四月十七日偕張彥聖陳景曾李道原郭與仁倪自明遊東岩蘭若分韻得夏字彥聖次豫夏字韻見貽乃亦次彥聖孟字韻為答彥聖再用夏韻見示又和以復再用前韻與彥聖景曾論詩景曾和孟夏二韻見貽復用孟韻追道向者泮林聚首出處之誼僕年來塊處閭閻緬懷平昔託交粗多然意氣相期者指不多屈因景曾詩中論及交道就韻以懷數子隔絶送傅子初先生之信州録事題傅伯玉來青軒瑞間雲開士雲深處昨以青鏡褐帶寄郭志道先輩暇日貽二詩以彰所貺不啻引玉之慚次韻為答春晴次申屠仲權進士韻申屠仲權與曹安雅翁為五側詩以論進學之道持來屬豫和韻送錢思復之海鹽州教授庚子歲暮飲曹園古梅下分韻淂動字有探得暗字者辭以韻拘閣筆主席者求豫補卷曹孺章得岸字韻時方從軍求余擬作此亦梅花之變風雅也庚子歲暮風雪極寒入春兼旬餘凍不解殊無春意青龍鎮文學林子敬相拉飲于鱣堂約共擬催春之作奉寄海鹽知州李正卿先生贈星數術士陳秋巖田家四時詞為九山學稼軒作戊申仲冬兒頴為館人所連得罪繫獄朋遊咸謂必老夫叫閽乃可昭雪由是衝寒扶憊戒途凡越旬始抵石城道間記所見淂詩如左澱湖吳門新安鎮沙湖義興前馬鎮溧陽七里山分界山官塘白府君廟謝亭岡青梗金陵夀靈源上人遊方錢塘林子文以星術醫藥畫筆遊食江湖為題行卷三首幼女嫠居澄江無後可託親往載之以歸庶盡父子之道且得縣宰給以公文沿途無關譏之虞丙辰歲月草一日出關宿城南屠家鎮逆旅中夜分枕上紀述示舟中同行者寄贈潁上縣令車則明會稽人小兒頴以罪遷彼此公知其非罪每加眄睞贈寫神王鑑堂寄南金絶句夢中紀遊題窠石絶句金錯刀竹二卷五言長律貞溪寒望至正庚辰歲暮大雪同孫果育季野衛立禮三先生分韻賦禁體淂天字二十韻太原秦景容肄業胄監以春秋經中大都鄉魁有田在海隅至正壬午秋以收稻至雲間録示近詩和韻復其來意二十韻送松江太守楊公正秩滿歸太原悼趙士弘先生宋宗室與先人同戊子生錢南金往歲胥會嘉禾𬗋虗觀近聞館於澱湖謝氏經年隔絶寄詩問訊二十韻辛丑早春和顔仲逸新正試筆韻客居感懷寄簡吳野舟四十韻邾仲誼博士久别重見以詩敘聞依韻之二十韻追悼南金錢文學二十韻乙卯立秋日客舍紀懷二十韻時長兒克頴遷于潁水幼兒克淳沒于濠梁故園凋落殘生茫然不能無感於天時也三卷五言短律陪孫果育先生遊干山次韻三首題圓智寺懷古太初書記贈壽南麓上人辛巳歲元日雨雪中飲曹雲西翁家次翁韻錢南金往海鹽省母阻風歸遲用曹雲西翁懷之寒食次雲翁韻還家舟中口號答宣伯褧孝廉見寄韻丁亥臘月草八日立春雲西翁有夜枕之作詰朝置酒餞歲次韻以復橫泖客舍立秋日橫泖雜言二首客舍早春寄南金哭劉希孟先生無錫東屯和朱梅山司丞韻二首歲暮九山道中二首橫溪夜思二首挽衛立禮先生二首泗涇雜詩四首次韻答馬本徑賢良見寄俞山月用韻敘舊如韻答之早春用前韻述懷録似馬俞二友城樓雨夜歲暮丁未已酉春金陵旅舍和蔡君立程傳可二友韻奉酬錢曲江見示韻漫成二首春日橫溪哭王子章先生二首挽謝德嘉同知二首和襄陽縣宰沙德潤春遊韻四卷七言古風昭君出塞圖松居圖歌為會稽陳元茂賦畫梅行會稽王元章惠以墨梅且題其上依題酬之玩古行武川唐允文蓄古圖畫碑刻金玉彞鼎及諸器物一室中名之曰玩古齋桃源圖歌答唐元度惠草堂詩陽羡茶旅秋行次韻答錢南金所寄知近寓秀水僧寺題許守中太和丹室四皓圖歌淡滄漁叟引為檇李蕭養素賦張氏三味軒歌縠江行三衢之江山常山二水自須溪金川合流交錯如縠故名縠江潁上文學掾徐景顏居於其間自號縠江漁隱云瀼東耕隱歌為烏溪黃成章賦近在潁庠分教五卷七言排律汪太守壽席同諸老分韻淂蘭字寄孤山和靖祠堂葉掌祠曹安雅翁新營瀼東莊六卷七言八句冬桃苦梅出遊别溪上親友次韻王彥強客懷江城暮春書事次韻安雅翁亭屏榮悴松圖寄錢素菴錬師師雲間南城大族寄錢南金孝廉奉寄熏自聞上人併謝槐茶冷淘之欵挽會稽吕勉夫先生咸平宰相申國公九世孫也次韻曹雲西翁雨窗述懷時故里大水題徐中孚髙士代祀武當桃源中朝諸公詩卷孤山新建和靖先生祠暮春次南金韻題錢素菴鍊師封雲室又可月亭謝王伯靜惠葛巾東永嘉裴日章進士次南金見寄韻寒食雨中奉王睂叟真人二首簡唐復齋徵士蕳吳太然髙士簡楷則中書記簡黃魯德秀才簡賢大愚座元送張茂夫之南安縣尹其父嘗為翰林學士早春錢南金用陳景曾韻紀會次韻孫果育先生海鹽茶園道中作地名夾山有金粟寺試茶院錢南金嘗約豫遊未果次孫果育先生觀海韻乙酉歲人日間雲端師過訪得唐復齋錢南金賢大愚各以倡和之詩見寄因就韻各答一章以當新春問訊首答間雲重柬南金頻年與陳景曾分教泮宫去秋竣事新春景曽有詩見寄次韻為答送吳景髙廣文秩滿歸永嘉次李太無鍊師見寄韻次韻謝戴彥李先生其父帥初先生與先大夫同登咸淳辛未榜遊吳中靈岩寺歲暮寄南金時在茜涇積善寺哭李仲輿隱君題吹笙人詩卷海濵何隱齋靜得軒辛卯歲臘月大雪次曹安雅翁韻海濵何氏攬秀樓新春答陸伯蒙見寄之韻答明心印上人約遊澱山寺石湖圓覺中半雲法師和前韻見寄再韻答之橫泖客舍二月隂雨兼旬無朋遊詩酒之樂花木禽鳥之觀不能不動貞溪之想賦以紀懷次韻答曹叔範春日感懷早春潘濟民逺過客舍以詩見示和韻為答紅梅贈王同僉次張漫亭雲溪菴晚望韻挽錢素菴錬師和倪德中見寄韻清明日陪王同僉遊馬迹山次韻焦漢章胡景仁見貽之什過千山答孫果育先生見示之韻寄馬敬常冠軍辛丑七月一日寓橫溪觀迎引大士經會酷暑鬱蒸廣庭露坐忽晚雲送雨神氣始蘇唐元度有詩見似因口占以復次答海慧久上人見寄韻漫成用楊廉夫韻寄鄉人魯道原贊府懷澄江鄧毅夫帥參寄馬文璧徴士畫得名蕳崑山慧明極上人善詩文隸古答馬敬常冠軍見寄韻答張孟膚見寄韻孫長慶小山招隱曹幼文遺安室錢思復寓泖濵見荷花憶西湖遊賞有詩述感書以求和步韻復命再和七夕思復韻再和癸卯元日與南金感舊而作張孟膚過余故里有詩寫曹雲翁西園景物不覺起余舊感向來文物荒蕪殆盡前輩典刑邈不可見行樂之地間存遺迹長厚之習則掃地矣不能已於言也青龍任氏母貞節堂楊廉夫受吳門賔館諸公餽餉為詩自述且求友朋屬和次韻答之甲辰元日次成元章韻早春過曹雲西翁舊園次錢思復寒食懷錢塘韻送勤無逸上人亂後歸西湖復業丁未元日和夏頥貞韻曲江居士特以險韻與倪雲林論方外事和者閣筆余適自外歸持來求正戲為下一轉語次元博弟初度自夀韻和楊鐵崖曹園感懷韻宗上人芝山小隱俞子昭見寄舊懷新感藹然言意之表次韻奉酬用曹新民韻感曹雲西翁園中老梅嵗晚訪陳景曾于金澤几間有新詩信筆和韻以述會合次韻吳野舟見寄新春和徐淡然處士韻俞遂良有遊九山之約借韻促之奉酬夏時可文學早春之韻淡然時可遂良三君子皆有春遊之興借韻訂之贈嘉定普福宮秦東海髙士送陸伯翔往金陵授業侯門贈理即中上人禪學之外尤明丹法九日橫溪客舍賦同門友葉子澄春星堂又賦子澄雪篷軒甲寅至日在橫泖客舍憶存沒二子和錢思復過真淨旭公房所作秋日過余山答胡克溫惠藤枕又鐵冠感橘黃岡賈彥德碧梧軒賦鄞士梅隱七卷七言絶句見梅懷錢南金早春鴛湖夜泊晚晴二首小鬟以墨海棠為名友人張子正為之畫以求題七夕孫果育丈席上有詩首句約坐客各續卒章為賦如左題演上人畫蘭題危鍊師春溪小泛畫題黃一峰畫扇陪曹雲西翁攜妓泛荷舟中次韻明日曹安雅翁約席上諸公再放蓮塘席間次韻次韻答衛立禮元旦之作桃源畫卷松竹卷子雪山便面春日和錢南金韻次答汪子翼進士嘗為采石山長三衢學正同曹雲西翁泛舟過千山賦孫果育丈千山小隱即景次張漫亭遣興四首從軍過太湖上梅花正開與顧允中趙君式登山縱步和韻三首挑菜美人圖和錢思復春日口號巳亥二月晦日寒食無錫東屯舟中漫成客樓春日西湖小景扇香雲室題曹元博壁間馬文璧小畫題項錬師山房倪元鎮小畫題夏頥貞所藏王眉叟真人馬逺溪月堂卷題扇寄鄒君顯君顯答賦再韻以寄一峯道人畫九山雪霽題墨竹李雲山畫秋林晚步梨花十二紅夏士安家董元小寒林辛亥中秋橫溪菴客窗對月口號桃花五色子橫溪晚步懷野舟客停簫士女圖息齊李使君自號廣陵醉客其守吳興日郊行見民家小湖石名蓮花峰玲瓏奇秀求之弗獲乃畫為圖且書其意以識不忘客有持以求題者杏花宫女柳隂宫女牡丹宮女薝蔔宮女秋懷故溪元日試筆上巳日泊舟崑山縣城北十里顧墓田家風暄日麗野花亂開邂逅父老為設尊俎相率縱步春興橫生乃為短述以紀所見曹園看梅貞溪𥘉夏次南金韻八卷會合聯句至正改元余寓虎林三閲月南金授業茶院孟冬余歸而南金亦還溪上夜坐縱談念不可無述以紀此會四十韻編校遂生亭聯句有序舟中聯句蟻術詩選目録畢蟻術詞選目録一卷令擬古十首河傳擬花間春日宫詞蝶戀花擬雪堂夜宿西掖鳳來朝擬清真汴隄送别臨江仙擬無住水檻過雨賣花聲擬順菴早朝應制杏花天擬白石垂虹夜泊小重山擬梅溪尊前贈妓鵲橋仙擬稼軒中原懷古浪淘沙擬遺山浙江秋興唐多令擬龍洲錢塘曉渡浪淘沙錢南金疾作代簡問訊浪淘沙晚窗過雨浪淘沙感舊虞美人泖濵泛荷虞美人謝張芳逺惠杏花虞美人水仙虞美人壬子歲元夕與邾仲義同客橫泖義約豫偕作詞紀節序豫應之曰古人有觀燈之樂故形之咏歌今何所見而為之乎義曰姑寫即景可也夜枕不寐遂成韻語時豫有子夏之戚每無歡聲詰朝見而義詞竟不成云二首河僡戲效花間體二首河傳戊戌歲暮吳中客樓夜思浣沙溪早春二首浣沙溪暮春雜興二首浣沙溪春感浣沙溪丁酉早春試筆柬錢南金浣沙溪折花仕女圖一落索新柳二首南柯子次韻衛立禮春街踏月減字木蘭花秋思減字木蘭花崔女郎像減字木蘭花吳江夜泊清平樂碧桃清平樂梨花戀繡衾初夏戀繡衾辛丑元日戀繡衾曹幼文以庚午歲太初老襌洎雲西居竹二翁燈夕所賦舊藁見示求豫追和屈指三十餘年三老仙去久矣今昔之感不能已于言也時至正辛丑上元日後庭花擬古二首二卷令追和趙文敏公舊作十首點絳脣無題點絳脣著色苔梅感皇恩憶梅江城子水仙蝶戀花無題二首虞美人無題二首浪淘沙無題太常引無題風入松南金寓檇李豫客海隅寄此以敘問濶風入松與李仲輿敘舊風入松白仁甫集中木蘭花慢結句云二十四橋明月玉人何處吹簫一峯黃先生每歎賞之一日作清平樂贈一道人末云未試囊中餐玉明朝且入藍田自以為得意時舉以似人仍索豫試作一解時陸彥文夏士賢諸子正有出郎行春之約乃綴此復命且訂其􅉀先生對客擊節不巳江月晃重山中秋客窗江月晃重山辛丑上元前一夕積雪試晴頓有春意小溪之上有張燈于館者慨然感興以此寫之憑闌人題曹雲西翁贈妓小畫古調笑令暮春三首昭君怨擬古阮郎歸次韻南金早秋夜思二首西江月東城夜思西江月賦陶九成甕牗朝光書室西江月酒闌與南金徜徉村巷訴衷情夜思太常引次韻黃伯陽寒夜太常引次韻伯陽雪中菩薩蠻新秋夜涼浴罷露坐二首菩薩蠻蘇小小像謁金門秋望二首點絳唇暮登新安鎮城樓二首點絳唇秋夜橫泖旅窗聽雨有懷故園點絳唇髙照菴先生宋朝遺老也嘗有長短句云夢繞荆溪蟹肥村甕滿每誦之自可想見村落秋深景物近見吳野舟誦而涵泳不巳有當豫心故述即景且期後約江城子癸丑歲季夏下浣信步至漁溪潘氏莊暑雨初霽夕照穿林與吳野舟坐緑樹間適行囊中有松雪翁所書江城子逸態飛越不忍釋手因依調口占以寄清興古人云人生百年間大要行樂耳卒章以此意為消憂之勉云花間訴衷情擬古二首花間訴衷情追配曹居竹翁舊作鬲溪梅令和南金鴛湖舟中韻玲瓏四犯秋感暗香吳中顧氏舊時月色亭陸壺天倡始用白石先生元韻以詠黃一峯持卷索賦掃花遊春晚次南金韻氐州第一丙申冬次錢素菴韻木蘭花慢蘇昌齡過曹雲翁貞溪故居賦詞致慕藺之感幼丈來致其意求次韻入卷長亭怨慢楊花渡江雲庚戌臘月九日與邾仲義同往江隂是夕泊舟無錫之髙橋亂後荒寒茅葦彌望朔吹乍靜山氣乍昏復明起與仲義登橋縱目霜月遍野情懷恍然口占紀行求仲義印可八聲甘州次錢思復懷錢塘舊遊韻法曲獻仙音寄夀雲西老人時吳興張石隱武林謝長源會稽胡伯大海隅王子章皆留老人賔館三月二十八日也滿江紅丙午重陽前二日雨霽泗涇倚闌望九山滿江紅己酉九日雨中家居憶夏士安頥貞蒙亨叔姪唐元望元泰元宏昆季六人皆常年同萸菊者一載之間俱罹患難各天一方信筆紀懷有不勝情者矣洞仙歌賦孫明叔水光山色舟江城梅花引己卯除夕江城梅花引陸壷天錢素菴二老相會皆有感懷承平故家之作索豫次韻而不及當道作者蓋俯念草木之味也祝英臺近和雲西老人秋懷韻紅林檎近水村冬景次錢素菴韻紅林檎近冬雨晚晴次謝士英韻春草碧次韻素菴遣懷隔浦蓮水檻晚晴三卷慢蘭陵王春日寄錢塘諸友蘭陵王王彥強以暮春有懷吳中故居之作見示此公蜀故家因以蜀語次韻答之蘭陵王歲晚憶王彥強而作八歸庚辰七夕與衛立禮同用此調八歸秋夜詠懷寄錢南金摸魚子歲晚感懷寄南金摸魚子寒食雨中摸魚子題王德璉山居圖摸魚子吳門客中九日次魏彥文韻摸魚子甲辰季秋與夏頥貞同在吳門屢有登山之興久雨不果重陽日友人羅仲達以節物為具同席數人意頗歡適乙巳九日在九山之東泗水上酒闌散步夕陽依依岡巒在望興懷往事不能無述未知明年又在何處駒隙如馳行樂能幾所謂難逢開口笑也賀新郎沙德潤任以南相與追和貫酸齋琵琶詞韻拉豫同賦苐元韻出入讀之不純也賀新郎題王德璉水村卷賀新郎曹園紅梅數種十餘樹雲西老人手植也時殊事異殘枝存者無幾其孫幼文命客飲于其下永嘉曹新民賦詞為詠豫適有出不與越數日幼文持卷來求次韻席上口占以答沁園春龍洲先生以此詞咏指甲小腳為絶代膾炙繼其後者獨未之見彥強庚兄示我眉目二作真能追逐古人於百歲之上不既難矣暇日偶於衛立禮座上以告孫季野丈為之擊節不已因約相與同賦翼日而成什焉沁園春無題沁園春早春雨中遣懷風流子次李仲輿秋思韻霜葉飛小溪歲晚與南金夜坐分韻花心動黃伯陽歲晚見梅適遇舊賦以贈别持行卷來求孫果翁衛立禮洎豫皆和花心動贈散妓蟾宫秀南浦次韻答南金見寄西河一春索居况味殊惡賦此紀懷四卷慢六州歌頭戊申歲一春強半風雨不可出户者至有兼旬之久三月九日寒食煙雨中望鄰牆桃花殆欲零落感人事之不齊歎芳時之易失信筆紀述斐然成章桓司馬謂樹猶如此人何以堪今乃信之矣東風第一枝年來逆境驅馳不知歲序之有逰賞忽忽春風徒起浩歎庚辰新正與南金剪燈小酌分題寫懷追念古人樂事今無一在眼時於文字中見其一二遂合想像舊事為之然心之所好亦寂寞中一樂也豫得此調南金得春從天上來東風第一枝春來兼旬寒氣不減舊臘正月草二日曹雲翁招飲聽雨西窗南金偶道及前作翁欣然命筆次韻故又口占為謝春從天上來次南金早春韻齊天樂甲戌清明雨中感春齊天樂己卯春客樓雨中懷小溪故人行樂齊天樂戊子清明次曹雲翁韻齊天樂甲午七月望後橫泖客舍驟雨頓涼秋聲滿樹小窗暮倚四無人聲暝色凝煙不勝悽黯闔户呼著此以紀旅思齊天樂乙未春暮錢素菴見和前韻再歌以謝之齊天樂戊戌冬初領省檄會無錫州將李正卿同檢踏屯田秋稼此邦兵餘民居蕩析皆黃茆白骨之境眼界殊惡李侯索賦道間口占復命齊天樂次韻王原吉龍江别業齊天樂張翔南寓金陵時嘗有寄金子尚魏彥文洎諸詞友之作乃辱彥文見念獨以賞音見許而不知豫頻年連嬰逆景久疏詞筆非復向時懷抱矣戊申秋杪邾仲義持示詞卷且辱彥文寄聲併索近作入卷乃為倚歌二闋其一以答彥文其一以喜翔南還家齊天樂寄張翔南霓裳中序第一中秋後二夕對月疏簾淡月和黃伯成吳興道中韻角招故園舊有老梅數樹自庚午至庚辰十載之間六遭巨浸無一存者年來惟起步月前村之歎辛巳正月草四日曹雲翁以紅蕚一枝見豫風度絶韻舊感橫生念之不置因綴此闋為解併以謝翁焉角招次黃伯陽苕溪舟中韻憶舊遊追和魏彥文清明韻水龍吟戊申燈夕雲間城中作蟻術詞選目録
