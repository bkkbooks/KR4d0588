  text: 蟻術詩選目錄
  hash: sha256:2e72d8994ce5716eb77cb55b8b882ae5990bd91dd6549e723812d4c9f1e2b64f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0588_SBCK_000-1a}
body:
  text: 一卷五言古風秋懷次韻王彦強監稅中秋不見月又次九日韻夏夜夜謁青龍文廟和孫果育先生曉行池上韻晩望五側體齋居讀書傚晦菴先生體二首早春次陸伯弘韻陳元茂别去十年扁舟由山隂来有詩敘懷次韻識喜二首用上人萬玉軒上武陽太守汪公國良公新安人善文詞書翰次宇文子貞别駕見貽韻熏自聞上人禪房與陸伯弘暮坐偶成全真師鄭無用北遊午日曹雲西翁厚堂分韻玉字秋懷擬古用黃伯成韻黃仲珍會試回潘省中有詩㽞别沙徳潤任以南皆次韻持来求予著語德潤以南又賦以適逺興再和爲荅贈經筵檢討太原陳敏夫四月十七日偕張彦聖陳景曾李道原郭與仁倪自明遊東岩蘭若分韻得夏字彦聖次予夏字韻見貽乃亦次彦聖孟字韻爲荅彦聖再用夏韻見示又和以復再用前韻與彥聖景曾論詩景曾和孟夏二韻見貽復用孟韻追道向者泮林聚首出處之誼僕年来塊處閭閻緬懷平昔託交粗多然意氣相期者指不多屈因景曾詩中論及交道就韻以懷數子隔絶送傅子初先生之信州錄事題傅伯玉来青軒瑞閒雲開士雲深處昨以青鏡褐帶寄郭志道先輩暇日貽二詩以彰所貺不啻引玉之慚次韻爲荅春晴次申屠仲權進士韻申屠仲權與曹安雅翁爲五側詩以論進學之道持来屬予和韻送錢思復之海鹽州教授庚子歳暮飲曹園古梅下分韻淂動字有探得暗字者辭以韻拘閣筆主席者求予補卷曹孺章得岸字韻時方從軍求余擬作此亦梅花之變風雅也庚子歲暮風雪極寒入春兼旬餘凍不解殊無春意青龍鎭文學林子敬相拉飲于鱣堂約共擬催春之作奉寄海鹽知州李正卿先生贈星數術士陳秋巖田家四時詞爲九山學稼軒作戊申仲冬兒頴爲館人所連得罪繫獄朋游咸謂必老夫叫閽乃可昭雪由是衝寒扶憊戒途凡越旬始抵石城道間記所見淂詩如左澱湖呉門新安鎮沙湖義興前馬鎮溧陽七里山分界山官塘白府君廟謝亭岡青梗金陵夀靈源上人遊方錢塘林子文以星術醫藥畵筆遊食江湖爲題行卷三首幼女嫠居澄江無後可託親往載之以歸庶盡父子之道且得縣宰給以公文沿途無關譏之虞丙辰歳月廿一日出關宿城南屠家鎮逆旅中夜分枕上紀述示舟中同行者寄贈潁上縣令車則明會稽人小兒頴以罪遷彼此公知其非辠毎加眄睐贈寫神王鑑堂寄南金絶句夢中紀遊題窠石絶句金錯刀竹二卷五言長律貞溪寒望至正庚辰歲暮大雪同孫果育季野衛立禮三先生分韻賦禁體淂天字二十韻太原秦景容肄業胄監以春秋經中大都鄕魁有田在海隅至正壬午秋以收稻至雲間録示近詩和韻復其来意二十韻送松江太守楊公正秩滿歸太原悼趙士弘先生宋宗室與先人同戊子生錢南金往歳胥會嘉禾𬗋虗觀近聞館於澱湖謝氏經年隔絶寄詩問訊二十韻辛丑早春和顔仲逸新正試筆韻客居感懷寄簡吳野舟四十韻邾仲誼博士乆别重見以詩敘聞依韻之二十韻追悼南金錢文學二十韻乙卯立秋日客舍紀懷二十韻時長兒克頴遷于潁水㓜兒克淳沒于濠梁故園凋落殘生茫然不能無感於天時也三卷五言短律陪孫果育先生遊干山次韻三首題圓智寺懷古太初書記贈壽南麓上人辛巳歳元日雨雪中飲曹雲西翁家次翁韻錢南金往海鹽省母阻風歸遲用曹雲西翁懷之寒食次雲翁韻還家舟中口號荅宣伯褧孝㢘見寄韻丁亥臘月廿八日立春雲西翁有夜枕之作詰朝置酒餞歲次韻以復橫泖客舍立秋日橫泖雜言二首客舍早春寄南金哭劉希孟先生無錫東屯和朱梅山司丞韻二首歳暮九山道中二首橫溪夜思二首挽衛立禮先生二首泗涇雜詩四首次韻荅馬本勁賢良見寄俞山月用韻敘舊如韻荅之早春用前韻述懷録似馬俞二友城樓雨夜歲暮丁未已酉春金陵旅舍和蔡君立程傳可二友韻奉酬錢曲江見示韻澷成二首春日橫溪哭王子章先生二首挽謝德嘉同知二首和襄陽縣宰沙德潤春遊韻四卷七言古風昭君出塞圖松居圖歌爲會稽陳元茂賦畵梅行會稽王元章惠以墨梅且題其上依題酬之玩古行武川唐允文蓄古圖畵碑刻金玉彞鼎及諸器物一室中名之曰玩古齋桃源圖歌荅唐元度惠草堂詩陽羨茶旅秋行次韻荅錢南金所寄知近寓秀水僧寺題許守中太和丹室四皓圖歌澹滄漁叟引爲檇李蕭養素賦張氏三味軒歌縠江行三衢之江山常山二水自須溪金川合流交錯如縠故名縠江潁上文學掾徐景顏居於其間自號縠江漁隱云瀼東畊隱歌爲烏溪黃成章賦近在潁庠分教五卷七言排律汪太守壽席同諸老分韻淂蘭字寄孤山和靖祠堂葉掌祠曹安雅翁新營瀼東莊六卷七言八句冬桃苦梅出遊别溪上親友次韻王彦強客懷江城暮春書事次韻安雅翁亭屏榮悴松圖寄錢素菴錬師師雲間南城大族寄錢南金孝㢘奉寄熏自聞上人併謝槐茶冷淘之欵挽㑹稽吕勉夫先生咸平宰相申國公九世孫也次韻曹雲西翁雨牕述懷時故里大水題徐中孚髙士代祀武當桃源中朝諸公詩卷孤山新建和靖先生祠暮春次南金韻題錢素菴鍊師封雲室又可月亭謝王伯靜惠葛巾東永嘉裵日章進士次南金見寄韻寒食雨中奉王睂叟真人二首簡唐復齋徵士蕳吳太然髙士簡楷則中書記簡黄魯德秀才簡賢大愚座元送張茂夫之南安縣尹其父嘗爲翰林學士早春錢南金用陳景曾韻紀會次韻孫果育先生海鹽茶園道中作地名夾山有金粟寺試茶院錢南金嘗約予遊未果次孫果育先生觀海韻乙酉歳人日閒雲端師過訪得唐復齋錢南金賢大愚各以倡和之詩見寄因就韻各荅一章以當新春問訊首荅閒雲重柬南金頻年與陳景曾分敎泮宫去秋竣事新春景曽有詩見寄次韻爲荅送呉景髙廣文秩滿歸永嘉次李太無鍊師見寄韻次韻謝戴彦李先生其父帥初先生與先大夫同登咸淳辛未牓遊呉中靈岩寺歳暮寄南金時在茜涇積善寺哭李仲輿隱君題吹笙人詩卷海濵何隱齋靜得軒辛卯歲臘月大雪次曹安雅翁韻海濵何氏攬秀樓新春荅陸伯蒙見寄之韻荅明心印上人約遊澱山寺石湖圓覺中半雲法師和前韻見寄再韻荅之横泖客舍二月隂雨兼旬無朋游詩酒之樂花木禽鳥之觀不能不動貞溪之想賦以紀懐次韻荅曹叔範春日感懷早春潘濟民逺過客舍以詩見示和韻爲荅紅梅贈王同僉次張澷亭雲溪菴晚望韻挽錢素菴錬師和倪徳中見寄韻清明日陪王同僉遊馬跡山次韻焦漢章胡景仁見貽之什過千山荅孫果育先生見示之韻寄馬敬常冠軍辛丑七月一日寓横溪觀迎引大士經㑹酷暑鬰蒸廣庭露坐忽晚雲送雨神氣始蘇唐元度有詩見似因口占以復次荅海慧乆上人見寄韻澷成用楊廉夫韻寄鄕人魯道原賛府懷澄江鄧毅夫帥叅寄馬文璧徴士畵得名蕳崑山慧明極上人善詩文隷古荅馬敬常冠軍見寄韻荅張孟膚見寄韻孫長慶小山招隱曹㓜文遺安室錢思復寓泖濵見荷花憶西湖遊賞有詩述感書以求和歩韻復命再和七夕思復韻再和癸卯元日與南金感舊而作張孟膚過余故里有詩寫曹雲翁西園景物不覺𧺫余舊感向来文物荒蕪殆盡前輩典刑邈不可見行樂之地間存遺跡長厚之習則掃地矣不能已於言也青龍任氏母貞節堂楊㢘夫受吳門賔館諸公餽餉爲詩自述且求友朋屬和次韻荅之甲辰元日次成元章韻早春過曹雲西翁舊園次錢思復寒食懷錢塘韻送勤無逸上人亂後歸西湖復業丁未元日和夏頥貞韻曲江居士特以險韻與倪雲林論方外事和者閣筆余適自外歸持来求正戲爲下一轉語次元博弟初度自夀韻和楊鐵崖曹園感懷韻宗上人芝山小隱俞子昭見寄舊懷新感藹然言意之表次韻奉酬用曹新民韻感曹雲西翁園中老梅嵗晚訪陳景曾于金澤几間有新詩信筆和韻以述會合次韻吳野舟見寄新春和徐澹然處士韻俞遂良有遊九山之約借韻促之奉酬夏時可文學早春之韻澹然時可遂良三君子皆有春遊之興借韻訂之贈嘉定普福宮秦東海髙士送陸伯翔往金陵授業侯門贈理即中上人禪學之外尤明丹法九日橫溪客舍賦同門友葉子澄春星堂又賦子澄雪篷軒甲寅至日在橫泖客舍憶存没二子和錢思復過真淨旭公房所作秋日過余山荅胡克溫惠藤枕又鐵冠感橘黄岡賈彦德碧梧軒賦鄞士梅隱七卷七言絶句見梅懷錢南金早春鴛湖夜泊晚晴二首小鬟以墨海棠爲名友人張子正爲之畵以求題七夕孫果育丈席上有詩首句約坐客各續卒章爲賦如左題演上人畵蘭題危鍊師春溪小泛畵題黃一峰畵扇陪曹雲西翁攜妓泛荷舟中次韻明日曹安雅翁約席上諸公再放蓮塘席間次韻次韻荅衛立禮元旦之作桃源畵卷松竹卷子雪山便面春日和錢南金韻次荅汪子翼進士嘗爲采石山長三衢學正同曹雲西翁泛舟過千山賦孫果育丈千山小隱卽景次張澷亭遣興四首從軍過太湖上梅花正開與顧允中趙君式登山縦歩和韻三首挑菜美人圖和錢思復春日口號巳亥二月晦日寒食無錫東屯舟中澷成客樓春日西湖小景扇香雲室題曹元博壁間馬文璧小畵題項錬師山房倪元鎭小畵題夏頥貞所藏王眉叟真人馬逺溪月堂卷題扇寄鄒君顯君顯荅賦再韻以寄一峯道人畵九山雪霽題墨竹李雲山畵秋林晚歩梨花十二紅夏士安家董元小寒林辛亥中秋橫溪菴客牕對月口號桃花五色子横溪晚歩懷野舟客停簫士女圖息齊李使君自號廣陵醉客其守呉興日郊行見民家小湖石名蓮花峰玲瓏奇秀求之弗獲乃畵爲圖且書其意以識不忘客有持以求題者杏花宫女柳隂宫女牡丹宮女薝蔔宮女秋懷故溪元日試筆上巳日泊舟崑山縣城北十里顧墓田家風暄日麗野花亂開邂逅父老爲設尊俎相率縱歩春興橫生乃爲短述以紀所見曹園看梅貞溪𥘉夏次南金韻八卷㑹合聯句至正改元余寓虎林三閲月南金授業茶院孟冬余歸而南金亦還溪上夜坐縱談念不可無述以紀此會四十韻編校遂生亭聯句有序舟中聯句蟻術詩選目録畢蟻術詞選目録一卷令擬古十首河傳擬花間春日宫詞蝶戀花擬雪堂夜宿西掖鳳来朝擬清眞汴隄送别臨江仙擬無住水檻過雨賣花聲擬順菴早朝應制杏花天擬白石垂虹夜泊小重山擬梅溪尊前贈妓鵲橋仙擬稼軒中原懐古浪淘沙擬遺山浙江秋興唐多令擬龍洲錢塘曉渡浪淘沙錢南金疾作代簡問訊浪淘沙晩牕過雨浪淘沙感舊虞美人泖濵泛荷虞美人謝張芳逺惠杏花虞美人水仙虞美人壬子歳元夕與邾仲義同客横泖義約予偕作詞紀節序予應之曰古人有觀燈之樂故形之咏歌今何所見而爲之乎義曰姑寫即景可也夜枕不寐遂成韻語時予有子夏之戚每無歡聲詰朝見而義詞竟不成云二首河僡戯效花間體二首河傳戊戌歳暮呉中客樓夜思浣沙溪早春二首浣沙溪暮春雜興二首浣沙溪春感浣沙溪丁酉早春試筆柬錢南金浣沙溪折花仕女圖一落索新柳二首南柯子次韻衛立禮春街蹋月减字木蘭花秋思减字木蘭花崔女郎像减字木蘭花呉江夜泊清平樂碧桃清平樂梨花戀繡衾初夏戀繡衾辛丑元日戀繡衾曹㓜文以庚午歳太初老襌洎雲西居竹二翁燈夕所賦舊藁見示求予追和屈指三十餘年三老仙去乆矣今昔之感不能已扵言也時至正辛丑上元日後庭花擬古二首二卷令追和趙文敏公舊作十首點絳脣無題㸃絳脣著色苔梅感皇恩憶梅江城子水仙蝶戀花無題二首虞美人無題二首浪淘沙無題太常引無題風入松南金寓檇李予客海隅寄此以敘問濶風入松與李仲輿敘舊風入松白仁甫集中木蘭花慢結句云二十四橋明月玉人何處吹簫一峯黃先生毎歎賞之一日作清平樂贈一道人末云未試囊中餐玉明朝且入藍田自以爲得意時舉以似人仍索予試作一觧時陸彦文夏士賢諸子正有出郎行春之約乃綴此復命且訂其􅉀先生對客撃節不巳江月晃重山中秋客牕江月晃重山辛丑上元前一夕積雪試晴頓有春意小溪之上有張燈于館者慨然感興以此寫之凭闌人題曹雲西翁贈妓小畵古調咲令暮春三首昭君怨擬古阮郎歸次韻南金早秋夜思二首西江月東城夜思西江月賦陶九成甕牗朝光書室西江月酒闌與南金徜徉村巷訴衷情夜思太常引次韻黄伯陽寒夜太常引次韻伯陽雪中菩薩蠻新秋夜凉浴罷露坐二首菩薩蠻蘇小小像謁金門秋望二首點絳唇暮登新安鎮城樓二首點絳唇秋夜横泖旅牕聽雨有懐故園點絳唇髙照菴先生宋朝遺老也甞有長短句云夢遶荆溪蠏肥村甕滿毎誦之自可想見村落秋深景物近見呉埜舟誦而涵泳不巳有當予心故述卽景且期後約江城子癸丑歳季夏下澣信歩至漁溪潘氏莊暑雨初霽夕照穿林與呉埜舟坐緑樹間適行囊中有松雪翁所書江城子逸態飛越不忍釋手因依調口占以寄清興古人云人生百年間大要行樂耳卒章以此意爲消憂之勉云花間訴衷情擬古二首花間訴衷情追配曹居竹翁舊作鬲溪梅令和南金鴛湖舟中韻玲瓏四犯秋感暗香呉中顧氏舊時月色亭陸壺天倡始用白石先生元韻以詠黄一峯持卷索賦埽花遊春晚次南金韻氐州第一丙申冬次錢素菴韻木蘭花慢蘇昌齡過曹雲翁貞溪故居賦詞致慕藺之感幼丈来致其意求次韵入卷長亭怨慢楊花渡江雲庚戌臘月九日與邾仲義同往江隂是夕泊舟無錫之髙橋亂後荒寒茅葦彌望朔吹乍静山氣乍昏復明起與仲義登橋縱目霜月遍野情懐恍然口占紀行求仲義印可八聲甘州次錢思復懐錢塘舊遊韻法曲獻仙音寄夀雲西老人時呉興張石隱武林謝長源㑹稽胡伯大海隅王子章皆留老人賔館三月二十八日也滿江紅丙午重陽前二日雨霽泗涇倚闌望九山滿江紅己酉九日雨中家居憶夏士安頥貞蒙亨叔姪唐元望元泰元宏昆季六人皆常年同萸菊者一載之間俱罹患難各天一方信筆紀懐有不勝情者矣洞仙歌賦孫明叔水光山色舟江城梅花引己卯除夕江城梅花引陸壷天錢素菴二老相㑹皆有感懐承平故家之作索予次韻而不及當道作者葢俯念艸木之味也祝英臺近和雲西老人秋懐韻紅林檎近水村冬景次錢素菴韻紅林檎近冬雨晩晴次謝士英韻春草碧次韻素菴遣懐隔浦蓮水檻晚晴三卷慢蘭陵王春日寄錢塘諸友蘭陵王王彦強以暮春有懐呉中故居之作見示此公蜀故家因以蜀語次韻荅之蘭陵王歳晚憶王彦強而作八歸庚辰七夕與衛立禮同用此調八歸秋夜詠懐寄錢南金摸魚子歳晚感懐寄南金摸魚子寒食雨中摸魚子題王德璉山居圖摸魚子呉門客中九日次魏彦文韻摸魚子甲辰季秋與夏頥貞同在呉門屢有登山之興乆雨不果重陽日友人羅仲達以節物爲具同席數人意頗歡適乙巳九日在九山之東泗水上酒闌散歩夕陽依依岡巒在望興懐往事不能無述未知明年又在何處駒隙如馳行樂能幾所謂難逢開口笑也賀新郎沙德潤任以南相與追和貫酸齋琵琶詞韻拉予同賦苐元韻出入讀之不純也賀新郎題王德璉水村卷賀新郎曹園紅梅數種十餘樹雲西老人手植也時殊事異殘枝存者無幾其孫幼文命客飲于其下永嘉曹新民賦詞為詠予適有出不與越數日幼文持卷來求次韻席上口占以荅沁園春龍洲先生以此詞咏指甲小脚爲絶代膾炙繼其後者獨未之見彦強庚兄示我眉目二作真能追逐古人於百歳之上不旣難矣暇日偶於衛立禮座上以告孫季野丈爲之擊節不已因約相與同賦翼日而成什焉沁園春無題沁園春早春雨中遣懐風流子次李仲輿秋思韻霜葉飛小溪歳晚與南金夜坐分韻花心動黄伯陽歳晚見梅適遇舊賦以贈别持行卷來求孫果翁衛立禮洎予皆和花心動贈散妓蟾宫秀南浦次韻荅南金見寄西河一春索居况味殊惡賦此紀懐四卷慢六州歌頭戊申歳一春强半風雨不可出户者至有兼旬之乆三月九日寒食烟雨中望鄰牆桃花殆欲零落感人事之不齊歎芳時之易失信筆紀述斐然成章桓司馬謂樹猶如此人何以堪今乃信之矣東風第一枝年来逆境驅馳不知歳序之有逰賞忽忽春風徒𧺫浩歎庚辰新正與南金剪燈小酌分題寫懐追念古人樂事今無一在眼時於文字中見其一二遂合想像舊事爲之然心之所好亦寂寞中一樂也予得此調南金得春從天上來東風第一枝春來兼旬寒氣不减舊臈正月廿二日曹雲翁招飲聽雨西牕南金偶道及前作翁欣然命筆次韵故又口占爲謝春從天上來次南金早春韻齊天樂甲戌清明雨中感春齊天樂己卯春客樓雨中懐小谿故人行樂齊天樂戊子清明次曹雲翁韻齊天樂甲午七月望後横泖客舍驟雨頓凉秋聲滿樹小窓暮倚四無人聲暝色凝烟不勝悽黯闔户呼著此以紀旅思齊天樂乙未春暮錢素菴見和前韻再歌以謝之齊天樂戊戌冬初領省檄㑹無錫州將李正卿同檢踏屯田秋稼此邦兵餘民居蕩析皆黄茆白骨之境眼界殊惡李侯索賦道間口占復命齊天樂次韻王原吉龍江别業齊天樂張翔南寓金陵時嘗有寄金子尚魏彦文洎諸詞友之作乃辱彦文見念獨以賞音見許而不知予頻年連嬰逆景乆疎詞筆非復向時懐抱矣戊申秋杪邾仲義持示詞卷且辱彦文寄聲併索近作入卷乃爲倚歌二闋其一以荅彦文其一以喜翔南還家齊天樂寄張翔南霓裳中序第一中秋後二夕對月疎簾淡月和黄伯成呉興道中韵角招故園舊有老梅數樹自庚午至庚辰十載之間六遭巨浸無一存者年来惟𧺫歩月前村之歎辛巳正月廿四日曹雲翁以紅蕚一枝見予風度絶韻舊感横生念之不置因綴此闋爲解併以謝翁焉角招次黃伯陽苕溪舟中韻憶舊遊追和魏彦文清明韵水龍吟戊申燈夕雲間城中作蟻術詞選目録
