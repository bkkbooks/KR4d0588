front:
  text: 蟻術詩選卷之三
  hash: sha256:04ea5d4e1c8bcafa54d296c478ea0bf411d8017610fbc05884e2993247097198
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0588_SBCK_003-1a}
body:
  text: 元雲間邵復孺著明新都汪稷校五言短律陪孫果育先生遊干山次韻三首題圓智寺古寺藏雲表幽花繞路傍溪山如有約心迹總相忘翠壁題詩迹青籃采藥香野人應未識白髮舊潘郎懷古太初書記此老誰復記近來何處尋勤勞非左計正始有餘音月冷虗白室秋髙空翠林遺蹤不可訪回首碧雲深虛白空翆皆其室名贈夀南麓上人暮下山房榻晨炊石澗泉聽鐘清夜坐移枕白雲眠南麓曾題竹東林未種蓮何當結茆屋投老學逃禪辛巳歲元日雨雪中飲曹西翁家次翁韻望眼鯤鵬運驚心犬馬年東皇開萬象南雪暗中天歲事驅馳裏村居寂寞邊椒花易為醉夜久不成眠錢南金往海鹽省母阻風歸遲用曹雲西韻懷之村纜曉未解溪風晚自和君行殊未久花落巳無多夜饌魚如玉春庭雀可羅遲遲去魯日遊子意如何寒食次雲翁韻春信催玄鳥客愁聞杜鵑一村寒食雨三月杏花天物色知誰賞風光亦可憐西湖長入夢人在采香船還家舟中口號人語荒村晚船行逆水風平蕪鷗外緑落日鴈邊紅奔走生涯拙歡娛往事空故園看漸近喬木有無中答宣伯褧孝廉見寄韻髙致嵇中散能書禇遂良家聲惟學禮經術更尊王湖海多清議丘園閟耿光驊驑終闊步未肻漫騰驤丁亥臘月草八日立春雲西翁有夜枕之作詰朝置酒餞歲次韻以復蠟酒今朝臘牛鞭昨日春山林藏勝地天地有遺民池草生新夢窗梅若故人夜深風雪底雞唱又催晨橫泖客舍立秋日塵世常為客天時又立秋病餘疏蕳册地僻少朋遊髙樹商聲動虛窗雨氣浮浮生迷出處秖合老林丘橫泖雜言二首橫泖清晨望人煙樹幾重三江歸禹貢衆水會吳封雲倚孤村塔潮生半夜鐘田翁談古迹隔浦是青龍橫泖在吳淞江南數十里廣厦人來少青山逺對門緩潮通曲港髙樹接遙村井記袁嵩宅鄉連宰我墩行吟聊適興心迹未須論袁嵩宅宰我墩皆在數里間遺迹存焉客舍早春下榻荒村夜挑燈傳舍春江湖為客處花鳥隔年人世事隨時變風光幾度新天涯芳草緑想見故溪濵寄南金樹老深村巷苔荒舊釣磯地偏途路隔世亂簡書稀病骨須丹鼎間身且褐衣春來能載酒重話久相違哭劉希孟先生蜀國山川秀吳門閥閲深家聲推朔黨世業擅南音時俗防遺直江湖見古心寥寥𬗋霞譜諸子尚能尋有道常髙世懷才只曵裾賦愁周庾信卧病漢相如貧幸家氊在清無儋石儲斯文多汲引淚落寄來書無錫東屯和朱梅山司丞韻二首世亂人煙廢村荒道路賒逺山猶突兀朽木自欹斜黃落驚林葉紅搖見渚花獨憐行役倦回首鬢霜華此地窮兵後前朝勝迹賒黃沙成廣漠白骨競橫斜鶴去空華表鷗飛起浪花却思天地裏底事有紛華歲暮九山道中二首兵火何多難人煙此獨存鶴歸城郭老龍去海波渾廢屋青山寺斜陽錦樹村蹉跎猶自任軒豁共誰論向老忘機事無營守故林風霜屢採落身世轉浮沉列屋咻齊語孤舟動越吟梅開驚歲晚於爾慰貞心橫溪夜思二首宿霧隨雲斂寒星著水明客舟移逺岸戍柝報初更老覺驅馳倦愁思喪亂平故人雞黍約歲晚更多情海角天寒夜沙頭月暗時梅花還入夢芳草不成詩聞道懷南郭傳書憶下邳所嗟遲暮色豈計往來期挽衛立禮先生二首文獻承平族衣冠靜壽堂廛居成大隱家學擅遺芳牀上圖書富壺中藥草香清門堪佚老喬木遽斜陽白雪孤鸞操紅塵小鶡冠陶情千日酒養道九還丹風月詩篇逸乾坤舞袖寬花堂行樂地春事在芝蘭泗涇雜詩四首閲世心先老看山興橫生驅馳仍合道遲暮若為情事向愁邊廢詩從酒後成晚來黃葉墜閉戶聽秋聲客枕驚秋夢鄰舂起夜歌兵塵長荏苒歲月易消磨末習遊談勝浮生左計多扁舟未落手浩蕩白鷗波秋盡江村迥時危世路艱地偏從漫浪身老絶躋攀隱几懷南郭移文尚北山興來仍極目詩滿夕陽間鴈鶩橫秋影村墟起暮寒隱淪同木石遊惰廢衣冠白日那能駐青山不厭看故人江海隔驚喜問平安次韻答馬夲徑賢良見寄公府徵賢日賔筵講道時抗詞風灑灑退食晝遲遲才美蒼生望文髙宰相知曵裾才借徑入幕巳先期俞山月用韻敘舊如韻答之市樓聯榻夜溪館􅋈船時縱酒花飛遍吹簫月到遲情隨時事改心有故人知但得江山在逍遙自可期早春用前韻述懷録似馬俞二友剪燭驚新歲看花感舊時身間從鬢改親老願春遲貧豈揚雄逐愁惟庾信知風塵任萍梗未負野人期城樓雨夜十月荒城夜三更暗雨天鴈聲營柝外雞唱寺鐘前松菊何人問萍蓬往夢牽物華兼世態回首一茫然歲幕丁未江海嵗云晏乾坤戰未闌世途長恍惚吾道轉艱難陶徑無成趣龐門敢遺安豈知投老日不厭逺遊冠已酉春金陵旅舍和蔡君立程傳可二友韻六朝江左國二月雨中春舉目山河異驚心草木新盍簪忘孟浪把酒慰艱辛莫問庭花曲興亡有鬼神撫事傷遲暮勞生感晦明風塵城郭老花柳歲時更典午虛龍虎阿房實鼎鐺春寒欺旅客二月未聞鶯奉酬錢曲江見示韻何遜詩逾古江淹筆尚靈秋風黃葉寺春雨緑莎廳行樂那能繼浮沈不暫醒鹿門在人世何日遂濳形漫成二首久雨秋將盡愁雲冷未開形神同木石眼界總蒿萊舊讀書忘記新成句懶裁棲遲何所託衰謝莫相催風急欲墐戶夜寒思授衣亂離生事拙漂泊壯心違舐犢長形夢亡羊久息機柴門秋色起倚仗看雲飛春日橫溪對酒忘衰鬢看花憶故園春光空在眼客路總忘言老羡山林逸愁嫌市井喧周旋從習俗出處信乾坤哭王子章先生二首家世儒為業江湖字淂名貧居成樂地孝養出真情造士登侯泮觀光及帝京哲人天弗夀波冷自鷗􅉀好客長浮蟻書經每換鵝家庭聞禮早舍館育才多力學心何苦加餐老不磨斯文總凋落天道信如何挽謝德嘉同知二首鄉里推名族丘園重老成璽書來暮景玉樹起前聲讀史諳興廢彈冠荷寵恩晨星政寥落天道底無情髙世襟懷古承家姓字香塤箎曾迭奏橋梓復聯芳雲冷登山屐春間夢草堂爽靈應不朽騎鶴晉人鄉和襄陽縣宰沙德濶春遊韻春事元無算人生若有涯傍門新種柳滿縣舊栽花小隊東山屐清風北苑茶襄陽行樂處幾度接㒿斜蟻術詩選卷之三長洲吳曜書張敖陸本章權刻蟻術詞選卷之三元雲間邵復孺著新都汪稷校慢蘭陵王春日寄錢塘諸友舊時月曾照河橋夜别秋千下花露染衣倚馬相看動愁絶登臨黯望徹思落吳山萬疊江村路春水乍生南浦迢迢恨難越匆匆換時節怪驛未緘鱗平湖入夢情猶切嗟樂事長在壯遊都誤酣歌迷舞興未歇耿前恨休説悽咽亂愁結記詩滿花箋歌喚桃葉琵琶水面今誰撥但碧檻長倚楚蘺空擷相思難寄待更把斷柳折又王彥強以暮春有懷吳中故居之作見示此公蜀故家因以蜀語次韻答之錦江緑長想秦城在目瞿塘上春水􅋈船十二遙峰翠如簇羈懷未易觸斜日平原散牧潘郎愛年少宦遊遮莫吳霜鬢邊撲名家舊韋曲記雨臥叢花春覆慈竹東來重問烏衣屋愁濯錦人逺剪燈窗靜歸心偏是夢裏速更題柱曽卜悽獨帶移束正驛路騮嘶煙浦帆宿遨頭風度猶能續儘客館歌舞故人醽醁薛濤箋上寫恨處字可掬又歲晚憶王彥強而作暮天碧長是登臨望極松江上雲冷鴈稀立盡斜陽耿相憶憑闌起嘆息人隔吳王故國年華晚煙水正深難折梅花寄寒驛東風舊遊歷記草暗書簾苔滿吟屐無情征斾催離席嗟月墮寒影夜移清漏依俙曾向夢裏識恍疑見顏色空惜鬢毛白恨莫趂金鞍猶誤塵迹何時弭棹蘇臺側共漉酒紗帽放歌瑤瑟春來雙燕定到否舊巷陌八歸庚辰七夕與衛立禮同用此調涼欺羽扇風生蘄竹秋意漸滿院落商聲又過梧桐井還誤剖瓜佳會泛槎仙約謾憶中庭兒女夜幾笑語花樓歡樂尚認得織女橋邊半是舊烏鵲何事明河影下佳期如許暗抱一襟離索箭壺催夢枕屏移恨是青春行客對良宵感舊鬢髮蕭蕭歎潘嶽闌干迥翠簾休卷待到更深啼螿聲又作又秋夜詠懷寄錢南金清蟾半露驚烏三匝城上漏水乍滳微涼已透瀟湘簟還見小簾搖砌淡燈垂壁夜色迢迢人睡去正想到山陽吹笛做弄得客裏文園病後更無力還是秋期過了鳴蛩窗户又對新詩相憶片雲天外數峯江上幾誤湘靈瑤瑟嘆流光過眼宋玉多情共今夕滄浪興扁舟客與醉帽飄蕭亭臯清望極摸魚子歲晚感懷寄南金見梅花一番驚感天時人事如許星霜冉冉東流水牢落少年心緒時自語甚門外風埃緑鬢生塵土故人間阻奈歲晚相思雲寒悵望此意轉悽楚髫年蘿俯仰已成今古人生幾度歡聚故鄉景物渾非舊愁裏匆匆時序能記否記剪燭西窗暝坐聽風雨春來更苦奈酒量微增詩情未減何處喚儔侣又寒食雨中倚闌干暮雲千里天涯芳草悽楚愔愔巷陌重門掩何况滿窗疏雨江上路又還見黃金暗柳千萬縷荒村歲序縱燕子新來梨花未掃好景自虛度江淹老誰解重吟恨賦東風依舊南浦青煙店合長安道夢裏翠屏朱户間院宇悵猶記佳人秉燭深夜語新詩謾與奈世事驅馳流光荏苒回首更延佇又題王德璉山居圖遍乾坤好山無數古來髙隱能幾相逢盡道林泉勝無奈利名朝市青嶂裡望曲徑深門倣佛柴桑里先生傲世任短褐長鑱清琴濁酒占斷晉風致疏林下别有談元麈尾清風長滿窗几門前剝啄何須問應是采芝仙子誰可比已不減當時雞犬空中起留連晚計儘穴石藏書鋤雲種玉千古有靈氣又吳門客中九日次魏彥文韻鴈來時晚寒初徑青燈搖動窗戶商聲暗起鄰牆樹觸景亂愁還聚秋又暮奈合造淒涼無處無笳鼓狂吟醉舞記滿帽簮花分籌藉草騎馬忘歸路懷人逺有恨憑誰寄語虗名長是相誤天涯節序渾非舊留得滿城風雨心萬縷謾自喜孤髙不惹沾泥絮羈懷倦訴好分付兒曹耘耝三徑早晚賦歸去又甲辰季秋與夏頥貞同在吳門屢有登山之興久雨不果重陽日友人羅仲達以節物為具同席數人意頗歡適乙巳九日在九山之東泗水上酒闌散步夕陽依依岡巒在望興懷往事不能無述未知眀年又在何處駒隙如馳行樂能幾所謂難逢開口笑也記年時滿城風雨姑蘇臺下重九客樓已辦登臨屐曾為好山回首延佇久望翠壁嶙峋間却題詩手相逢野叟強笑折黃花亂簪烏帽來與共尊酒流光去肯為間人宿留驚心節序依舊西風只麼吹蓬鬢病骨尚堪馳驟官渡口便擬喚扁舟往問江潭柳眀年健否縱世故無情未應遲暮辜負此時候賀新郎沙德潤任以南相與追和貫酸齋琵琶詞韻拉豫同賦苐元韻出入讀之不純也馬上貂裘裂料眀妃幾畨回首舊家陵闕留得胡沙千年恨寫入冰絃四列想歷遍關河風雪彈動伊涼哀怨曲把梨園風韻都消歇南部樂向誰説多情只記瀟湘瑟縱而今宫移羽換此懷難竭便有傳來中原譜終帶穹廬煙月甚長是未歌先咽顧曲周郎今已矣滿江南誰是知音客人世事幾圓缺又題王德璉水村卷一段江南緑望依依沙鷗起處輞川橫幅十里平郊人煙聚掩映汀洲幾曲試與問隱君林屋花徑竹門春窈窕有蒼顏緑鬢人如玉揮白羽跨黃犢髙清逺繼巢由躅向滄浪濯纓垂釣自歌還續手種陂塘千株柳隔斷紅塵萬斛算􅍦有漁舟來熟待約西施同載酒趂桃花浪暖相追逐尋勝地訪遺俗又曹園紅梅數種十餘樹雲西老人手植也時殊事異殘枝存者無幾其孫幼文命客飲于其下永嘉曹新民賦詞為詠豫適有出不與越數日幼文持卷來求次韻席上口占以答海底珊瑚樹問鮫人幾時擎出碎為繁露蒨女拾來紉成佩妝點江南歲暮便掩映含章窗戶更著絳綃籠玉骨怕黃昏不向孤山路銀燭暗未歸去蘿中曾被梨雲誤最難忘長沙形勝水聲東注若見何郎須相報不改揚州韻度道穠豔尚重賦一點酸心渾不死笑桃根桃葉非吾故空谷底謾延佇沁園春龍洲先生以此詞咏指甲小腳為絶代膾炙繼其後者獨未之見彥強庚兄示我睂目二作真能追逐古人於百歲之上不既難矣暇日偶於衛立禮座上以告孫季野丈為之擊節不已因約相與同賦翼日而成什焉巧鬭彎環纎凝嫵媚明粧未收似江亭曉玩遙山拂翠宫簾暮卷新月橫鈎掃黛嫌濃塗鉛訝淺能畫張郎不自由傷春倦為皺多無力翻作嬌羞填來不滿橫秋料著得人間多少愁記魚箋緘啓背人偷斂鴈鈿膠併運指輕揉有喜先占長顰難效柳葉輕黃今在否雙尖鎖試臨鸞一展依舊風流又􅃮點填眶鳳梢侵鬢天然俊生記隔花瞥見疏星炯炯倚闌延佇止水盈盈端正窺簾瞢騰憑枕睥睨檀郎長是青銷凝久待嫣然一顧密意將成困酣時倚銀屏強臨鏡挼挲猶未醒憶悵中親覩似嫌羅密尊前斜注翻怕燈明醉後看承歌時鬭弄幾度孜孜頻送情難忘處是香羅搵透别淚雙零又早春雨中遣懷菜甲封泥桃英怯凍淺寒尚濃正小窗深掩暮雲低密頺垣半露殘雪玲瓏冷逼單衣愁欺倦枕暗度一番花信風年光在但塵襟耿耿鏡鬢匆匆十年舊夢無蹤算何異天涯隨轉蓬甚愔愔坊陌燈宵間過沈沈煙雨酒興誰同鳥已春聲人猶舊感點檢芳菲前事空鶯花好更明年此際何處相逢風流子次李仲輿秋思韻芙蓉秋水緑河橋畔駐馬落霞明念蘇小畫樓蠧侵花簡謝娘朱戶香冷銀屏悵猶記潯江留夜客滕閣醉詩賓驛上信音美人遲暮鴈邊城郭霜氣淒淸潘郎愁多少傷情處無奈兩鬢星星江路晚風三疊長是愁聽縱綵筆殷勤近來無凖畫闌縹眇一向誰憑何處笛聲哀怨幽夢難成霜葉飛小溪歲晚與南金夜坐分韻晚風吹醒梅花夢吟窗人倦無語楚天雲淡鴈凄涼何况黃昏雨又忽忽驚心歲序村荒更迥無鐘鼓對夜色蕭條謾借得孤缸耿耿獨照離緒憔悴怨墨頻題征衣慵整怪却雙鬢如許故園猶是舊東風往事今塵土但憶著章臺柳樹十年青鏡催遲暮任艷懷如流水芳草王孫有誰能賦花心動黃伯陽歲晚見梅適遇舊賦以贈别持行卷來求孫果翁衛立禮洎豫皆和東閣何郎記當時曽賞舊家紅蕚綵筆賦詩緑髮簪花多少少年行樂自從驚覺揚州夢芳心事等間忘却斷魂處月明江上路迷天角老去才情頓薄奈客聚相逢共傷漂泊洗盡艷粧留得遺鈿尚有暗香如昨歲寒天逺離杯短匆匆去孤懷難託向花道春來未應誤約又贈散妓蟾宫秀塵滿人間有誰能分得廣寒風度謾道小嬌疑是前身曽到巖花深處九霄宫殿春長好只合伴霓裳􅋖侣問何事等間回首却迷塵趣縹眇瓊樓玉宇奈霧鬢煙鬟不勝風露小試蒨粧才近芳尊已變世間歌舞想應羞見嫦娥寡重來傍巫山行雨總忘了青冥向來去路南浦次韻答南金見寄煙水隔殊鄉又匆匆誤了踏靑時候一别幾多時河橋外官柳青條猶瘦君來為問渡江桃葉曾來否生怕木蘭雙艇子只道故人依舊孤村寒食駸尋料歸期漸近花開休驟油壁耐東風先拚取同醉亂紅千畝憑闌望久幾畨魂斷煙中岫從此相逄休草草莫對夕陽搔首西河一春索居況味殊惡賦此紀懷春夢覺一聲何處啼鳥東風二月舊江南庾郎暗老嫩寒日日禁單衣闌干憑遍清曉水涯柳條漸好玉驄幾度曾到如今巷陌踏青時故人去杳杏花不在宋東鄰苔牆猶自圍繞鳳鞋次第又鬭草暗淒涼前度懷抱病後不禁愁惱怕西園路濕殘紅如掃空憶花前纎腰嫋蟻術詞選卷之三
