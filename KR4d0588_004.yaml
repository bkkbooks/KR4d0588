front:
  text: 蟻術詩選卷之四
  hash: sha256:9778c7f9936258511ccf51f971b8b63964fe8efff8b300fdb7e00424a630b59f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0588_SBCK_004-1a}
body:
  text: 元雲間邵復孺著明新都汪稷校七言古風昭君出塞圖漢代明妃余所恥遺迹猶存畫圖裏當時秖恨失蛾睂千古相傳關國體佳人命薄何足論大國禮重當自尊堂堂卯金亦左計孰謂夷虜能懷恩古今多少明妃曲萬語千言題不足獨餘哀怨在琵琶近日音聲轉煩促君不聞樊舞陽霍票鷂與嫖姚同英略奇謀竦廊廟精兵十萬可橫行殄滅強梁在談笑吁嗟此志何因循漢廷遂有胸奴塵松居圖歌為會稽陳元茂賦暨陽山人讀書處隱約蓬萊山下住天荒地老百年餘留淂承平歲寒樹樹根古屋弗計年樗櫪為棟薪為椽蒼龍摩霄雲沃若天籟滿坐風泠然山人住久忘清苦淳朴襟懷侔上古夜然明節作書燈晝煮茯苓登宴俎海桑遷變孰可稽直欲掉首從夷齊提封一夕遍鄉井髙舉更覓青雲梯我欲尋真換凡骨屢訪名山猶未淂山人若許穿雲蘿輒向畫圖求髣佛畫梅行會稽王元章惠以墨梅且題其上依題酬之道人畫梅墨色爛頃刻畫成還自歎不教么鳳識貞心故遣苔花封老幹空江歲晏冰雪寒江上月明人倚闌隔江美人相見難誰其致之白雲間美人為我話疇昔感此孤髙混荆棘春風一夜到寒窗坐使化工長太息嗟豫清絶忘世緣得此似挹羅浮仙歲寒相􅍟深崖巔夢中梨雲豈其然玩古行武川唐允文蓄古圖畫碑刻金玉彞鼎及諸器物一室中名之曰玩古齋吁嗟世道久不古元氣寥寥僅如縷諸生日夕事蕳編猶欲冥心究鄒魯三墳五典素不完雲門咸池寂無語昆岡之火幾燎天大貝天球藐何許古人代謝如逝波古道凋喪猶傾柯區區器物有成毀嵗月既邁存無何唐生遊心及千載所見輒辨正與訛掃除一室玩往昔迥與先哲相漸摩木落江空天地老江上相逢慚潦倒世降俗薄殊紛綸乃是設心求古道我亦齋居養時晦賴爾能來慰枯稿從兹可見羲黃心歲晏相看期保抱桃源圖歌陶公昔作桃源記謂有桃源在人世不因漁子逐桃花那淂世間知此地重尋舊路迷其蹤天閟絶境無由通偶因天台劉阮事乃謂此有神仙宮二事流傳夲殊絶後世相沿罔分別昌黎先生一品題疑誤為君談笑決誰將豪素畫作圖髙唐想像終糢糊陵遷谷變屢反掌此中按堵猶唐虞民物于今同土苴有力難尋種桃者白髮吳儂淚盈把安淂桃源遍天下答唐元度惠草堂詩陽羡茶君不聞浣花老翁隔春水長日清吟泣神鬼不求録事草堂資秖送先生太倉米又不聞玉川破屋洛城裏門外日髙猶未起忽傳諫議送月團便欲蓬萊作仙子二公髙興出天機千古清風韻人齒文章舉世尚茶歌名教相宗賴詩史青溪野人書屋底歲晚山空念知已梅花獨伴客氊寒閉戶窮年窺故紙晉昌才子好事者每與論文心輒喜襟懷蕭散涵江湖學問春容有源委昨朝過我荒寂濵清貺灑然兼二美我聞建安兵火餘紙價倍髙書版燬又聞北苑道路艱青篛瑊題阻千里豈期物色融心神不啻瓊瑰溢筐篚呼童洗鼎烹石泉展卷髙歌發宮徵枯腸漱滌生陽春老眼光明耀窗几我生追羡少陵翁千載神交淂其旨從來亦有嗜茶癖知味陸郎差可擬邇年潦倒絶賞音一旦為君重屈指山中白雲不可持何以殷勤報投李相期月夜來叩門瀹茗談詩洗心耳旅秋行次韻答錢南金所寄知近寓秀水僧寺紅葉風髙墮寒雨商聲起自蒹葭渚三江逝水憺忘歸獨客羈心亂如縷此時客在江之湄日暮途逺迷東西鷗波萬頃清景絶鴈門十月愁雲低得子素書如夢裏知與山僧相汝爾東林結社或種蓮南郭養生終隱几憶昔與子同居時花前美酒燈前詩清風眀月見玄度流水髙山得子期只今與子成二老修名不立欣聞道歲月無情左計多江湖滿地知心少十年共坐風塵中夙昔玄鬒成飛蓬慣看青白有俗眼已悟得失如塞翁歲晚終歸釣遊處與子誅茆黃葉路時從編簡對古人日涉田園自成趣人生百嵗何時間我輩久在浮沉間吁嗟長安日巳逺莫負江南煙雨山題許守中太和丹室至人水火鍊空鼎鼎中之物亡形影涵融造化發春溫感兆乾坤歸內景後來學者傳失真幾人能識天地根強將旁門作大道甲是乙非徒糾紛山人何處得其祕烹煮砂鉛作良劑坐收元氣入刀圭起療沉痾等兒戲歸來燕處一室中神光不夜春融融可憐下土混昏濁豈若違世超鴻濛九還七返窈莫測欲往從之限𬈑渤安得凌風振玄翮稽首安期問五石乞與寒瓊換凡骨四皓圖歌長春道士身姓許博雅好奇心獨苦手持六尺商山圖要我賦時原上古展圖宛見四老人秦漢既逺誰識真當年事迹稍茫昧舉世傳説徒紛紜我聞前王建邦國樹子由來戒無易卯金欲貽四海憂於此忍能忘羽翼此行實為蒼生計世變相仍豈天意大綱一正四百年孰謂斯人終避世山中𬗋芝今有無草木蒼莽埋丘墟驚濤虐雪昏天衢祖龍餘孽何由蘇曷若繼爾為逺圖淡滄漁叟引為檇李蕭養素賦淡滄溪與鴛湖接中有漁舟小如葉漁郎把釣溪之濵日夕歌呼弄煙月滄𬈑空濶風常寒紅塵辟易天為寬襟期不啻在楚澤出處似欲凌嚴灘一夜嚴飈吹虐雪千山鳥斷人蹤滅忽然漂泊箕潁間洗耳長流更清絶人生百年俱有涯榮辱不到漁樵家天吳海若惡作劇信緣齊汨終無譁江南處處青山在江上故人毛髮改尚餘鷗鳥識孤舟不信相看換桑海武陵只在天地間可惜晉士成空還桃花舊路若邂逅謝絶世故無厚顔張氏三味軒歌古來賢達當衰世往往全身逺名利典午骨肉紛相􅋊東曹掉首成歸計秋風一夕吹三吳吳中正美蓴與菰四腮入饌復雋永千里命駕忘馳驅一時託興無遺恨百世流芳有清論微物因人乃得名至今三美餘風韻東曹一去今千年後昆散處猶多賢時持三物弔遺迹清風峻節還依然九月秋深天宇肅三髙祠前風落木􅅹酒髙歌送迎曲吳淞水碧吳山緑縠江行三衢之江山常山二水自須溪金川合流交錯如縠故名縠江潁上文學掾徐景顏居於其間自號縠江漁隱云吾聞西安之水如羅紋江山形勝相吐吞二川合流勢不分清淑迥迥風雲奔中有幽人居喬木映衡門髙世偃蹇甘隱淪先秦文字不啻數千卷日夕莊誦若對羲黃人興來出門放孤艇一竿坐釣清𥻘𥻘落落渭濵叟榮名滿乾坤籍籍煙波徒髙節摩峨岷清風灑灑絶俗塵千載而下氣益振神交夢接意所親古今成敗在指掌一室燕坐窮無垠十年戎馬中原昏城郭挑達乃爾成紛紜抗顔為師我輩事忍使此道尼不伸慷慨投袂起歘見俎豆陳況兹潁水湄禮義夙所尊歐蘇之迹逺未泯至今父老遺風存君今生意滿薻芹木天米廩手可捫某丘某水荒荆榛猿驚鶴怨誰與鄰君不見鹿門谷口雞犬村野人笑語春風溫年年碧草哀王孫瀼東耕歌為烏溪黃成章賦近在潁庠分教天寶乾元亂離日東川西川氣蕭瑟中原旋復九重城瀼水猶存萬家室杜陵野老悲無家白頭漂泊錦水涯入幕何堪故人死為農復歎京國賒此翁髙節無復得後輩猶懷踵遺迹蜀山萬里何茫茫詩史千年長歷歷我有丘壑如瀼東春耕秋斂誰復同浣花草堂在眼中日夕想見前賢風十年出處學彌勵放逐居然增意氣從容時發舞雩詠淒涼亦灑新亭淚人生百年安可常行役孰不懷其鄉一朝杖屨賦歸去故園草木生光芒蟻術詞選卷之四元雲間邵復孺著新都汪稷校慢六州歌頭戊申歲一春強半風雨不可出戶者至有兼旬之久三月九日寒食煙雨中望鄰牆桃花殆欲零落感人事之不齊歎芳時之易失信筆紀述斐然成章桓司馬謂樹猶如此人何以堪今乃信之矣劉郎老去辜負幾東風思前度元都觀舊遊蹤怕重逢新種桃千樹花如錦應笑我容顏改渾不比向時紅我亦無情久矣繁華夢過眼成空縱而今再見何似城中往事匆匆任萍蓬憶歡娛地經行處秦樓畔橋東春冉冉花可可霧𪷟𪷟水溶溶幾度題歌扇欹醉帽繞芳叢時序改人面隔鬢霜濃别有武陵溪上秦人在仙路猶通待前村浪暖鼓楫問漁翁此興誰同東風第一枝年來逆境驅馳不知歲序之有遊賞忽忽春風徒起浩嘆庚辰新正與南金剪燈小酌分題寫懷追念古人樂事今無一在眼時於文字中見其一二遂各想像舊事為之然心之所好亦寂寞中一樂也豫得此調南金得春從天上來舞館簮蛾譙門試角疏燈時弄春影曉簷鐡馬𫾣晴夜箏錦鴻送冷銅馳陌上早官柳輕黃籠暝料小樓一枕微酲已被嫩寒欺醒花信阻瑣窗慣靜芳事杳翠衾倦整晚粧似怯梅鈿舊香尚凝篆鼎朱門雙掩向鬭鴨闌干慵並待灞橋重暖新壚擬約蒨桃蘭艇又春來兼旬寒氣不減舊臘正月草二日曹雲翁招飲聽雨西窗南金偶道及前作翁欣然命筆次韻故又口占為謝亂雨𫾣窗深燈暈壁孤屏相對吟影醉餘夢蝶難尋起來睡鴛較冷東風急處又卷得殘雲催暝奈暗愁忽到梅邊夜半粉香熏醒門正掩暮簾乍靜花未閙小車預整鬬茶尚憶分曹賦詩更聨古鼎春衫慵試怕誤了金鞍相並待小桃開滿前溪且踏武陵漁艇春從天上來次南金早春韻九陌香泥正楚館欺寒裊裊春雞兩行簾底銀燭千枝花市笑語聲齊喜盤行纎手剪生菜巧簇青絲晚晴時漸紅蕖照眼黃柳舒眉東風舊家樂事奈酒興沉沉舞隊僛僛小譜鸞箋重樓羯鼓生怕誤却花期好情懷都改年光在物換星移誤芳菲想六橋燈火猶繞蘇堤齊天樂甲戌清明雨中感春離歌一曲江南暮依俙灞橋回首立馬東風送人南浦認得當年楊柳梨花過後悄不見鄰墻弄梅纎手綺陌東頭箇人還似舊時否相如近來病久縱腰圍暗減猶未全瘦宿酒昏燈重門夜雨寒食清明依舊新愁謾有第一是傷心粉銷紅溜待約明朝問舟官渡口又己卯春客樓雨中懷小溪故人行樂東風吹雨春城晚黃昏小樓人靜燕子朱簾譙門畫角收拾柳邊殘暝微燈照影歎塵滿書牀火銷香鼎客裏王孫故家樂事尚能省人生壯遊幾許舊鷗應怪我沙上盟冷刻燭催詩傾尊欵話長憶西窗風景相思有興待官渡回潮野橋吟艇莫遣啼鵑夜深驚夢醒又戊子清明次曹雲翁韻深窗暮灑梨花雨隨風亂零如霰寒食初過連陰未解黃昏酒闌人倦春鐙謾剪怪濃潤沾衣淺寒迎面芳事蹉跎強將花譜自舒卷天涯芳草漸滿踏靑晴路阻闌檻憑遍燕隔重門舟迷晚渡應是不勝清怨歡逰未展縱不奈悽迷懶尋消遣只怕晴時落紅千萬點又甲午七月望後橫泖客舍驟雨頓涼秋聲滿樹小窗暮倚四無人聲暝色凝煙不勝悽黯闔户呼鐙著此以紀旅思碧梧庭院秋聲早愔惜暮天雲影雨送涼蟬風欺倦翼絡緯猶啼金井疏窗弄暝正犀押簾垂畫屏燈冷節序依然旅懷長是歎流景舊家園苑廢久歲寒松桂在清事誰領待月幽軒尋涼小艦斷夢有時提省乘槎路迥便逸興相牽倦塗難騁甚日歸來傍湖耕二頃又乙未春暮錢素菴見和前韻再歌以謝之柳花飛滿春歸路隔江暮雲搖影草暗河橫塵昏水驛難覓􅋖翁丹井年光漸暝任老鬢霜凋壯心灰冷世故紛紜寄書長擬問弘景山林多少勝地四時蕭散處談笑能領小舫尋詩輕裘把釣此意只今誰省斜陽迥迥算往夢難追曠懷休騁目斷南湖平蕪千萬頃又戊戌冬初領省檄會無錫州將李正卿同檢踏屯田秋稼此邦兵餘民居蕩析皆黃茆白骨之境眼界殊惡李侯索賦道間口占復命西風滿面吹華髮肩輿遍行荒野草莾無垠人煙掃迹猶有青山如畫斜陽又下奈倦宿軍營喜逢田舍官事驅馳旅途情緒頓衰謝天邊雁飛漸逺故園回首處離恨難寫寒入征衣雲遮望眼忘郤向來瀟灑塵氛未解便好問歸舟早圖休駕夢繞寒溪小梅應綻也又次韻王原吉龍江别業去年弭棹龍江市曾瞻故人衡宇樹隔琴牀藝香書屋搗藥時鳴清杵壺籖報午想頻拂詞箋間修花譜如此幽間雅宜連榻聽風雨多君曵裾相府縱風流文采終帶清苦借筯籌帷持杯説劍長歷漢臺秦礎尋幽訪古便後約須期細論重與歲晚山中茯苓還共煮又張翔南寓金陵時嘗有寄金子尚魏彥文洎諸詞㕛之作乃辱彥文見念獨以賞音見許而不知豫頻年連嬰逆景久疏詞筆非復向時懷抱矣戊申秋杪邾仲義持示詞卷且辱彥文寄聲併索近作入卷乃為倚歌二闋其一以答彥文其一以喜翔南還家當年放浪蘇臺下長從故人詩酒繭帖飛花鵾絃度曲思繞閶門楊柳星霜易久悵十載分攜幾畨回首滄海塵昏屋梁落月尚依舊山林何處寄傲不如人意事長是八九有客傳書多君玩世况是不忘衰朽明朝見後縱少壯難追好懷還有醉墨淋漓浩歌開笑口又寄張翔南六朝千古臺城路傷心幾畨興廢形勝空存繁華暗老舉目江山還異風塵萬里奈遷客驅馳去程迢遞故舊相望鴈邊消息眇難寄春風鳳凰臺上轉蓬回首處應歎身世江總情深陳琳檄倦投老竟成歸計斜陽某水且淨洗緇衣任休行李只怕東山興來還又起霓裳中序第一中秋後二夕對月秋堂氣漸肅暮角吹來聲斷續憑遍闌干幾曲又涼戰庭梧風𫾣簷竹多情宋玉對楚天無奈幽獨中秋過月華未闕夜色燦如燭空谷美人羇束又老盡江南草木愁來心緒易觸目斷瑤臺夢繞金屋鴈歸猶未卜且漫放題紅去速悽迷處年來詩鬢換動鏡中緑疏簾淡月和黃伯成吳興道中韻蒼煙古木漸暝入小溪鷗鷺如玉斜倚孤蓬眺晚毳裘寒肅秋娘渡口上橫處舊曾尋五陵芳躅畫樓燈火如今冷落塵滿華屋奈景物因人反覆算千古風流今有誰續苕水東邊月上酒醒人獨角聲吹老梅三弄想依俙曾夢蛾緑西風回首山中有人滿頭黃蘜角招故園舊有老梅數樹自庚午至庚辰十載之間六遭巨浸無一存者年來惟起步月前村之歎􅉝巳正月草四日曹雲翁以紅蕚一枝見豫風度絶韻舊感橫生念之不置因綴此闋為解併以謝翁焉夢雲杳東風外畫闌倚遍寒峭小梅春正好謾憶故園花滿林沼天荒地老但暗惜王孫芳草鶴髮仙翁洞裏為分得一枝來便迎人索笑窗曉冷香窈靄幽情雅淡不減孤山道舊愁渾欲掃却眀朝新愁縈繞何郎易惱且約住傷春懷抱綵筆風流未少更何日玉簫吹金尊倒又次黃伯陽苕溪舟中韻暮雲起苕溪上畫橈蕩漾春水道人煙浪裏信筆賦詩千古無此吳頭楚尾問舊日陶朱鄰里擷得江蘺寄逺向天角歇孤帆且行行休矣吟倚柳隂傍晚花期暗數芳事今餘幾舊遊難屈指化鶴歸來依然城市紛紜閙紫豈不羡山林宮徴更約吟船共􅋈賸判得落殘花欺行李憶舊遊追和魏彥文清眀韻記烏衣巷口灞水橋邊問柳尋花竟日追遊處儘揮鞭繡陌弭棹晴沙酒闌美人歸去香擁碧油車自綵筆題情金鐙欵醉幾度年華天涯故人逺料對景相思應念無家又見分榆火奈移根換葉往事堪嗟小樓倚遍殘照長羡暮棲鴉賴伴我消魂遙岑寸碧三四丫水龍吟戊申燈夕雲間城中作兵餘重見元宵淺寒收雨東風起城門傍晚金吾傳令遍張燈市報道而今依然放夜縱人遊戲望愔愔巷陌星毬散亂經行處無歌吹太守傳呼迢遞謾留連通宵沉醉香車寶馬火蛾麵繭是誰能記猶有兒童等間來問承平遺事奈無情野老聞燈懶看閉門尋睡蟻術詞選卷之四終
