front:
  text: 蟻術詩選卷之六
  hash: sha256:1fca7248ddf1ca6953993913eb64f7a5a1b1b677be6249b6791f47c078a67c46
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0588_SBCK_006-1a}
body:
  text: 元雲間邵復孺著明新都汪稷校七言八句冬桃重到玄都異昔時紅香冷落怯瓊肌天寒人面誰相映歲晚漁舟或可期三月禹門風浪惡小春仙洞雪霜遲淒􅋽不似天台路萬一劉郎有所思苦梅空濛烟霧滿羅浮紺碧生香夢未休緑髮夜寒遺玉瑱羽衣春暖怯蒼裘小窗橫幅丹青落古殿殘糚翆黛愁骨化寒瓊心似鐵至今么鳳妬風流出遊别溪上親友筆牀茶竈未荒凉籬下黃花尚晚香紀夢每疑蕉有鹿讀書却笑穀亡羊葵荒杜曲經秋雨柳老江潭帶夕陽明日扁舟隔煙水風流詩酒未能忘次韻王彥強客懷秋風城郭起層隂遼鶴歸來歲月深鏡裏光華催緑髮牀頭顔色歎黃金班生有志終投筆鍾子無言久廢琴白石溪頭問鷗鷺不堪塵事日侵尋江城暮春書事三月凝雲連白晝滿城宿雨漲黃沙歲華不改綿蠻鳥春事俱成頃刻花每厭巡窗飛野馬絶憐沉竈産官蛙庭槐自是南柯夢觸悟愁人起歎嗟次韻安雅翁亭屏榮悴松圖從來故國多喬木此地春風及暮隂榮悴忽看屏上樹扶疏却憶澗西林某丘易動頻年感今雨不來何處尋歲晚山空重回首題詩不覺小論心豫故家在嚴陵澗村之西寄錢素菴錬師師雲間南城大族南城曾看五陵花東郭新營處士家每向郢人傳白雪未從葛令問丹砂華亭夜聽橫江鶴銀漢秋期泛渚槎忽見梅花耿相憶夜來清夢繞蒹葭用曹雲西翁韻簡瑞閒雲開士清溪蘭若十里外謝絶塵緣定卜居風靜花飛巖上衲雨深苔汙壁間書酥燈夜話維摩室蠟屐春尋處士廬白髮江湖多歲月叢林禮法未能疏寄錢南金孝廉與子間濶始十日離别未逺相思深風燈耿耿美人夢江蘺漠漠遊子心緑柳向人春灑淚碧雲隔水暮生隂西園花事已寂寞莫為愁絶廢新吟奉寄熏自聞上人併謝槐葉冷淘之欵巳公屋下涼無暑翁仲門前水拍天槐葉冷淘時供客蓮華刻漏夜參禪獨居不廢叢林禮狥俗仍明出世緣自有門徒能養道無因重問瀼西田挽會稽吕勉夫先生咸平宰相申國公九世孫也家聲奕世畫凌烟曾傍城南尺五天白髮襄陽耆舊傳黃花栗里義熙年山中夜雨燒丹火門外春風載酒船何日蘭亭訪陳迹摩挲遺碣拜先賢次韻曹雲西翁雨窗述懷時故里大水積雨空齊晝欲眠莫雲親舍水茫然春餘故國烏衣夢秋惱中郎緑髮年漢柳蕭蕭吹笛裏巴山厯􅍓剪燈前正愁松蘜荒三徑失喜新詩寂寞邊題徐中孚髙士代祀武當桃源中朝諸公詩卷羽衣使者持金節今淂天香下玉墀四海山川歸望秩九重雨露及虛危桃花洞暖瓊田在華蓋峰髙鐵鎖乘𬗋府仙官來校籍想應曽采玉堂詩孤山新建和靖先生祠曾讀咸􅊭處士碑水沉亭北黍離離南枝不似當年樹今月曾看此夜詩歲久蒼麟眠古墓天寒白鶴認新祠斷橋流水聲嗚咽􅍦對清香酹一巵暮春次南金韻茸茸野草帶煙藍漠漠溪花隔霧酣村店人稀鶯囀午官河風暖柳眠三小童荷鍤朝朝筍幼㜏條桑處處𧖟錦里詩人最蕭散短笻時過小橋南題錢素菴錬師封雲室陸地仙家雲氣深達人棲息共無心山中虗室夜生白戶外長松晝落隂瑶草滿階童不掃洞天無鎖鶴來尋華山髙處春長好不管桑田變古今又可月亭結屋天壇爽氣多廣寒仙樹影婆娑神游太極黃庭景興繞虛空碧落歌竊藥姮娥秋有約吹笙王子夜相過道人燕坐光眀裏春滿華池白玉波謝王伯靜惠葛巾為嫌山鳥怪儒巾故使青綸矯俗塵章甫未能酬壯志逺游且復邁時倫對花漉酒青山暮閉戶煎茶白屋春三月苧衣相掩映舞雩定約詠歸人柬永嘉裴日章進士鹿鳴詩裏知名久鴈蕩山中識面難若士妙年先入幕有才如此盍彈冠炎方荔子書能致水國鱸魚興莫䦨我在谷陽城外住日長掃徑待吟鞍次南金見寄韻欲采江蘺遺所思蘼蕪滿地緑離離青春不送五窮鬼造化猶如一小兒落日中原鸚鵡賦東風南浦鷓鴣詞杜門一向生塵俗不覺今朝又有詩寒食雨中芳草離離遍五茸雲間舊為五茸城天涯收拾暮愁濃西郊風雨一百五南國江山千萬重眼底春光長拍塞鬢邊秋色肯從容䦨干此際偏腸斷零落梨花晚寺鐘奉王眉叟真人二首兩袖天香近六龍幾陪宸馭到蟾宫鑑湖一曲承恩後瀛海三神入望中新種梅花期處士久留丹井付仙翁漢家正重神仙事巳築崇臺倚碧空曽望清風過十洲寥陽宫殿五雲浮仙人金掌凉如水老子胡牀月滿樓談笑屢陪千日酒過從時借九花虬幾回目送飛鴻去憶共山中宰相遊簡唐復齊徵士五茸春水碧生烟歷歷平林隔武川狂客問奇長載酒仙人賣藥不論錢橘間棋子尋真樂竹下苔痕醒醉眠錦里錢郎來往熟相逢母惜寄新篇簡吳太然髙士玉皇香案久辭官小隱雲林帶鶡冠滄海三山求砭石黃房五夜轉還丹自緣瓜圃生涯拙頗覺桃溪去路難我亦山隂寫經手幾時換得白鵝看簡楷則中書記上人家在武塘南一曲林泉護石龕滿室天花紅陳陳繞池春草碧毿毿臯比教雨宗湖學麈尾清風雜晉談聞說吾儒黃叔度詩禪日日與同參簡黃魯德秀才洛下衣冠逺莫追城南韋杜本同時江山風景知何似湖海襟懷自有期近況俱題鸚鵡賦舊情猶託杜䳌詩蘭舟夢繞清溪曲杜若花開白晝遲簡賢大愚座元江湖名字久相知一棹秋風見面遲方外有緣能致我山中無物不堪詩更長屢下蓮壷箭雨暗猶殘竹院棊自恨野人無玉帶相逢未敢道深期送張茂夫之南安縣尹其父嘗為翰林學士玉堂學士家聲舊花縣郎官事業新庾嶺風煙終帶古楚江天氣最宜春好將鼎實調羮用莫遣鱸魚入夢頻料得此行詩更好因風寄與隴頭人早春錢南金見訪用陳景曹韻紀會春溪一櫂竹枝歌倒屣相迎感慨多塵土不知新歲改兒童共喜故人過對牀傾倒情還在接燭盤桓意若何如此襟懷最真率心聲􅍓厯見天和次韻孫果育先生海鹽茶園道中作地名夾山有金粟寺試茶院錢南金嘗約豫遊未果聞道夾山金粟寺一如兜率淨居天雲藏衲子煎茶屋春著仙翁載酒船打破斷碑何代始種來髙樹百年前錢郎詩裏曾相約蠟屐因循未了緣次孫果育先生觀海韻夫子舊傳觀水術先生到海輒尋源瀛洲方丈天茫昧暘谷嵎夷浪吐吞形勝不嫌吳地僻要荒共仰漢槎尊眀年三月桃花浪會有神魚過禹門乙酉歲人日閒雲瑞師過訪得唐復齊錢南金賢大愚各以倡和之詩見寄因就韻各答一章以當新春問訊首答閒雲野屋春生喜錫飛曹溪一宿話遲遲未忘兜率參禪解且問匡廬結社期世道不侔空向老物華如許却堪詩明朝煙水還迢遞慚負卭州竹一枝答復亝武川塘上暮雲飛春水迢迢放棹遲謾說銜杯如阮籍可能問藥訪安期人間動是經年别方外相傳近日詩願乞昌陽留緑鬢東風潦倒插花枝答南金茸泖天寒雪不飛茜溪雲斷鴈來遲春回故國元無賴人在殊方未可期芳草王孫何處客梅花人日去年詩門前雨後新流緑獨缺吟舟繫柳枝答大愚馴龍伏鉢夜深飛破衲生光出定遲柏子想應機不露梅花自與月相期從來名教唯多樂近日浮屠總好詩欲把談玄犀麈尾與君林下換松枝重柬南金江樹春雲興欲飛扁舟相見偶然遲風埃俱負幽棲役丘壑曾為汗漫期晉代玄談幾造道周南風化實關詩思君只隔烏衣巷喬木春深有舊枝頻年與陳景曾分教泮宫去秋竣事新春景曾有詩見寄次韻為答故人往往歡遊阻客舍朝朝俗事增秋冷泮池同撤席月明江市又收燈汗青編簡無新益罨畫闌干憶舊憑芳草連天未歸去小山招隱復誰能送吳景髙廣文秩滿歸永嘉東州文物恆多士此老家聲著昔時事業逺承湖學派典刑曾識漢官儀鴈山喬木春長在魚浦歸舟晚更移每共劇談前代事夕陽燕子獨相知次李太無錬師見寄韻華髮蒼顏白帢衣逺遊冠上異香飛花開碧洞春風起丹轉黃房夜氣微白雪詞章雲作篆玄洲步武玉為磯欲攜談麈壺中去共講隂符起陸機次韵謝戴彥李先生其父帥初先生與先大父同登咸淳辛未榜曲江宴集義熙年諸老風流競酒船後世尚存金殿策前修巳化玉樓仙日斜江燕春尋壘月冷湘靈夜促絃握手莫傷遲莫恨一經猶淂似韋賢遊吳中靈岩寺百尺蒼頑一徑通竹輿宛轉翆微中春尋謝監登山屐路入吳王避暑宮響屧廊深雲氣白彈琴石老蘚花紅吳兒不計興亡恨猶說陶朱霸越功歲暮寄南金時在茜涇積善寺隔岸人煙是茜溪𣑽王樓閣樹髙低美人只在寒雲外破屋依然谷水西歲晏冰霜無勝事春來花鳥待新題不堪音問經年絶夜久相思夢屢迷哭李仲輿隱君先生有道獨沉淪窮巷棲遲若廢人龍劒有靈能役鬼毛錐無術可娛親變來騷雅文逾古論入玄微學更醇重到西齊弔遺跡朔風吹淚灑叢筠題吹笙人詩卷截玉參差作一攢欲將天籟起雲端竹餘嶰谷年華老鳳去緱山月色寒江上酒闌人窈窕夜深簧暖燭汍瀾小樓吹徹東風冷􅍓􅍓江南入夢看海濵何隱齊靜得軒聞說髙居近十洲一塵不到海天浮簷前白日皆清景座上青山總勝逰花氣入簾春寂寂櫂歌到枕夢悠悠幾時約得蓬萊侶跨鶴秋空訪隱矦辛卯歲臘月大雪次曹安雅翁韻馮夷捲水夜深飛竟日同雲掩晝暉漢節凋零淹屬國琵琶哀怨泣明妃豈無鵝鴨攻城略自有龍蛇起陸機千古桐江擅髙節羊裘未肻換朝衣海濵何氏攬秀樓百尺髙居隔市寰青冥物色手堪攀目窮瀛海三神表身在匡廬五老間江燕舞殘春雨歇玉笙吹徹暮雲還登臨更起瑶臺興便欲淩風響珮環新春答陸伯蒙見寄之韻行藏每辱故人憐世道無情久荷氊天上寅賓平秩日山中甲子義熙年談玄廣坐風生席乘興孤舟雪滿川不怕春來增紙價快題新句任人傳答明心印上人約遊澱山寺人間樂事無前定方外論交有宿緣謝監好山長貯屐逺公結社合栽蓮三千世界非塵境九十春光半雨天準擬前村寒食後移尊共買澱湖船石湖圓覺中半雲法師和前韻見寄再韻答之石湖蘭若好林泉開士深居息萬緣閲世無塵心似水談經見性舌生蓮花邊問訊春三月江上懷人雨一天若淂贊公容夜宿便尋秖樹泊吟船橫泖客舍二月隂雨兼旬無朋游詩酒之樂花木禽鳥之觀不能不動貞溪之想賦以紀懷東風吹袂起征塵驚見門前柳色新客路驅馳連月雨故園隔絶幾分春杏花村落懷人逺芳草池塘入夢頻蓬鬢蕭蕭慚旅食人生只合早謀身次韻答曺叔範春日感懷年少光隂去等閒繁華過眼竟忘還王孫芳草天涯路仙子桃花海上山絶代風流多失意百年身世幾開顏重逢快覩新詩筆興繞平蕪夕照間早春潘濟民逺過客舍以詩見示和韻為答深谷荒涼動逺思隔年冰雪放船遲文風􅍓代有消長世道百年多亂離每憶漢槎天上下可勝羌管月中吹時危處處無行樂客裏逢春總不知紅梅夢入羅浮醉未醒梨雲路接錦宮城明妃誤受閼氏聘蒨女終騎玉鳳行踏月前村疑問酒餐霞閬苑勝調羮黃昏小立看清淺􅍓􅍓珊瑚水底眀贈王同僉萬里江山入戰圖歡聲一鼓集東吳三秋奉使終歸漢五月將軍欲渡瀘訓練只須揮白羽功名何止執金吾行當早入麒麟畫却弄扁舟泛五湖次張漫亭雲溪菴晚望韻雲溪菴外野人家秋晚行吟石徑斜胡馬長年肥苜蓿塞鴻一夜集蕪葭舟中歲暮懷張翰琴外風清感瓠巴天際楚江楓葉赤眼明只想是春華挽錢素菴錬師儀鳳橋邊喬木盡雙鴛湖外草廬荒土埋石磴栽松钁塵鎖雲窗辟穀方晉代清風當入傳郢中白雪定遺芳翩然跨鶴雲間去顔色猶疑在屋梁和倪德中見寄韻白首窮經未識兵年來世故總忘情棲遲豈謂逢衰世治忽何嘗屬腐生夜月賦詩嚴武幕春風醉酒亞夫營自慚疏濶元無補那淂微言協太平清明日陪王同僉遊馬跡山馬跡山中雨乍晴鴈門灣裏水初生山川易主何多難花鳥於人尚有情四海風塵均造化幾家歌舞過清明春風吹上籃輿去戲逐元戎小隊行次韻焦漢章胡景仁見貽之什屢經患難思逃世未有文章辱薦賢荒草夕陽多戰鼓落花春水失漁船黍離滿地空懷古萍泛無家亦任天猶幸晉人風度在相逢不肯廢詩篇過干山答孫果育先生見示之韻傾尊屢聽燈前雨揮麈長懷坐上風飯顆獨憐工部瘦溧陽應念孟郊窮黃塵世事悲歌裏白髮光隂醉夢中猶幸干山青在眼扁舟來往趂飛鴻寄馬敬常冠軍憶昨吳門八月樓將軍對客最風流青黃竹簡分詩韻紅白花枝計酒籌柳暗新營嚴武僃菊殘荒徑賦歸休春來又動江湖興準擬追尋話舊遊辛丑七月一日寓橫溪觀迎引大士經會酷暑鬱蒸廣庭露坐忽晚雲送雨神氣始蘇唐元度有詩見似因口占以復赤日黃埃蒸酷暑淡雲疏雨薦清秋三江海近新潮上七月天空大火流晉代有人皆曠達周南底事獨淹留此行已訂蓴鱸約何待須乘雪夜舟次答海慧久上人見寄韻海慧寺前官柳樹當年曾挽繫船枝一徔勝地經烽火無復叢林見禮儀雲冷沙汀鷗夢逺月明華表鶴聲悲孤舟尚有殘僧在頭白滄浪把釣絲漫成用楊廉夫韻歲月驅馳坐白頭巳將心事付東流百年南國無遺老千古東陵只故侯丘壑忘形羞覽鏡風塵滿眼倦登樓故人往往情懷在不廢山隂雪夜舟寄鄉人魯道原贊府七里灘頭野燐紅鄉關隔絶夢魂同由來王伯興衰際總在春秋筆削中蘭佩無時懷逺渚荷衣終古耐秋風相期共載華亭月歸訪雙臺把釣翁懷澄江鄧毅夫帥參鄧子清才意氣多承平風物飽經過談兵夜入青油幕載酒春鳴白玉珂客路情懷仍曠達鄉關歸計尚蹉跎春來應夢池生草遲我西窗剪燭歌寄馬文璧徵士畫得名有客寄家胥浦上放懷詩酒四時春輞川蕭散王摩詰谷口優游鄭子真夢裏江花生綵筆醉來山雨墊烏巾因君寫出蓬萊路喚起江湖老病身簡崑山慧明極上人善詩文隸古不見髙人兩載過望中樓觀碧嵯峨中原小篆黃龍刻西域靈書白馬䭾我輩襟懷於世薄禪家風度託詩多三江流水春還緑擬放輕舟入薜蘿答馬敬常冠軍見寄韻南越將軍思不羣東吳詩壘薄層雲魯連既出攘秦策司馬寧無難蜀文天地洪荒千古在山河形勝幾回分英雄自昔生衰世韜略于今巳屬君答張孟膚見寄韻雲邊城郭是蘇州一櫂輸君汗漫遊麋鹿臺荒山不改鴟夷江在水空流青藜仙杖應相訪𬗋錦奚囊莫漫投遲莫行藏君識我端居豈是傲王侯孫長慶小山招隱陸機山下小衡門晉代風流此獨存世亂有誰招隱士草生何處覓王孫上京冠蓋遙相望陋巷簞瓢頗自尊獨許野人分坐席時時􅔰掌到羲軒曹幼文遺安室家有襄陽耆舊傳經時幽事頗相關求田問舍中年後望水尋山夕照間白日戰塵飛不到滄江鷗鳥去仍還鹿門此去幾千里遺跡依俙尚可攀錢思復寓泖濵見荷花憶西湖遊賞有詩述感書以求和步韻復命每愛西湖六月涼水花風動畫船香碧筒行酒從容醉紅錦游帷次第張月殿承恩霑沆瀣星槎流影下陂塘江南秋冷紅衣落離立西風舊恨長再和吳山風物久荒涼十里紅蕖失舊香貝闕珠宮渾寂寞弓腰冷袖亦更張馮夷鼓罷風生渚太乙舟迷月暗塘異縣相思正愁絶一聲羌笛楚天長七夕次思復韻乞巧詩人白苧袍剖瓜宫女寶鸞刀銀河浩渺終難測粉席橫陳亦漫勞節物因人傳習俗經星何事有遊敖貧家用拙還依舊犢鼻仍將古錦韜再和梧風淅淅振絺袍又見深閨試剪刀時俗濫希天上巧仙家應厭世間勞那能髙㑹如秦女安淂良優學楚敖此夕相看對吟壘敢揮白羽運奇韜癸卯元日與南金感舊而作二十年前新歲日與君剪燭鬬新詩春迎北斗魁三象詞唱東風第一枝共喜舌存心似鐡不嫌身老鬢成絲椒花重為斯文頌拍塞陽和入酒巵張孟膚過余故里有詩寫曹雲翁西園景物不覺起余舊感向來文物荒蕪殆盡前輩典刑邈不可見行樂之地間存遺跡長厚之習則掃地矣不能已於言也故里依俙緑野堂軒窗面面俯滄浪長林接地隂如染逺岫當門翠欲翔石井銅鋪琪樹老雲階月砌蘚花粧煩君袖裏如椽筆寫入堅珉與記將青龍任氏母貞節堂龍江喬木映江波清白名門世不磨孝子善藏諼草什族人爭誦柏舟歌天寒翠袖愁何在春暖斑衣樂更多已喜年來慈竹長孫枝漸滿鳳皇坡楊廉夫受吳門賔館諸公餽餉為詩自述且求友朋屬和次韻答之甘露英華生間世文星光彩動南天公孫館下無虛士揚子亭中半列􅋖二月煙雲詩入畫百花洲渚酒如泉諸賢能致先生饌應取侯鯖手自編甲辰元日次成元章韻經年髙臥似袁安忽報新春起正冠門寫桃符寧却鬼盤行麵繭漫探官幾家夢草催詩句何處生花上筆端白髮不禁春色惱東風莫作故人看早春過曹雲西翁舊園曹園花木又經春舊客重來感慨頻先輩風流如隔世承平典故屬畸人唾壷麈尾何時設冷袖弓腰幾度新老眼看花重回首天涯無處不風塵次錢思復寒食懷錢塘韻夢裏錢塘鎖暮煙鶯花不是舊山川露凉古殿銅盤折月到荒臺錦樹圓綿上空存寒食節長安無復麗人天相看莫說承平事頭白傷心海變田送勤無逸上人亂後歸西湖復業海內年來尚阻兵叢林諸老亦凋零虎溪橋斷山靈去鷲嶺雲荒野燐青石蘚不侵詩壁字天花應待講臺經勤公歸去開樓閣歷􅍓諸天擁翠屏丁未元日和夏頥貞韻守嵗爐邊燭影搖門前賀客笑相邀謾將詩句題桃板便覺風光襲柳條時事總開良史筆曉班誰續侍中貂老夫無復承􅊭夢驚見春回北斗杓曲江居士以險韻與倪雲林論方外事和者閣筆余適自外歸持來求正戲為下一轉語續得曹溪第幾燈曲牀趺坐敢橫肱庭前擊竹知童子海上留衣記老僧花落空中多似雨瀑懸岩上直如繩若能問答無生話别有玄機最上乘次元博弟初度自壽韻君似陶潜早覺非我如李廣老尤奇稔聞桑海風波惡始信桃源歲月遲夢寐不忘重慶日笑談寧似太平時相看共識浮生理造化真如一小兒和楊鐵崖曹園感懷韻曹氏家園百歲餘承平遺跡久湮蕪路埋銅爵西陵瓦壁暗襄陽海嶽圖春雨荒池花濺淚夕陽喬木鳥呼雛凌虛臺上論興廢千古雄文屬老蘇宗上人芝山小隱翠微深處逺公家不與塵寰共嵗華寶樹七重環淨宇靈芝五色散天葩簷鈴響答頻伽鳥麈尾香飄薝蔔花獨許杖藜携酒客時來分席岸烏紗俞子昭見寄舊懷新感藹然言意之表次韻奉酬愁坐牽衣拂劒霜悲歌撫掌按伊涼塵中白日驅人老雲外青山引興長詩句近傳何遜好酒徒還放酈生狂羡君髙隱東林下罨畫圍屏面面張用曹新民韻感曹雲西翁園中老梅夜來夢入羅浮路解珮依俙見洛妃荒草等閒埋玉樹冷雲猶解護苔衣空懷吹笛花前醉無復觀燈月下歸老子風流總陳迹只留遺恨滿斜暉歲晚訪陳景曾于金澤几間有新詩信筆和韻以述會合茫茫岐路失東西冉冉緇塵翳客衣春雨滄江鷗識侣秋風華表鶴思歸殘生同藥迷仙島某水投竿感舊磯歲晚逢君如夢寐相看共喜姓名微次韻吳野舟見寄玄鶴歸來世事訛白鷗盟冷困滄波山河錦繡今誰識關塞荆榛莫浪過四序光隂歡樂少百年身世别離多老來不奈親情絶時復漫漫起夜歌新春和徐淡然處士韻青年有腳春如夢緑髮無情雪作堆世故紛紜催我老愁懷拍塞向誰開草荒金谷花無主日落烏衣燕不來待得東風到丘壑尚堪扶醉一登臺俞遂良有遊九山之約借韻促之千里漸成荒草地九山仍在亂雲堆孤村新歲春猶淺窮巷兼旬雨不開老我尚堪携酒共知君欲約故人來時危會面應難淂放浪須登百尺臺奉酬夏時可文學早春之韻春從雪後試初晴客在雲間憶故城賣藥仙人聲價重種桃隱者去留輕蟻杯餞蠟驚新味鳳曆催年感舊情猶幸與君同晦跡殘山剩水尚堪行淡然時可遂良三君子皆有春遊之興偕韻訂之間關水鳥報新晴拭目春生海上城好景盡從愁裏過賞心猶向老來輕百年往事如兒戲千古東風不世情長憶杜陵經喪亂曲江春色尚濳行贈嘉定普福宫秦東海髙士東華外史繼玄風普福仙源屬正宗筆底丹書呼白鶴匣中星劒閟蒼龍瑤壇功行三千數閬苑煙霞幾萬重有約同遊尋大藥明年先上大茅峰送陸伯翔翁往金陵授業侯門鳳凰臺上春風起鸚鵡洲邊暮景斜四海車書今復混六朝文物尚堪嗟深衣雪鬢絃歌老列鼎宫壷衮繍家回首故園如隔世身閒不必問生涯贈理即中上人禪學之外尤明丹法中年好道嗟何及方外論交夙有緣白日堂堂唯應世青山往往負談玄已期入社從彭澤豈謂逢僧似𬗋賢南派薛道光禪師號也借我林間松麈尾相看儘可答詩禪九日橫溪客舍晚節追思往事艱老來未得此心閒欲題紅葉無佳句相對黃花只强顔出處幸同衰草木登臨不愧舊江山酒杯還似當年緑忘却風前兩鬢斑賦同門友葉子澄春星堂君家住近白榆鄉依約風林左氏莊處士隱居春入畫賢人聚處夜生光乘槎泛渚仙風迥燒燭張筵飲興長底事同門少年子老來濶絶類參商又賦子澄雪篷軒歲晚瑤花滿太虛翩然蓑笠混樵漁浮家直到空明際問路重尋混沌初嚴瀨客星應黯淡山隂人跡久蕭疏老夫亦有孤舟在擬約凌寒共釣漁甲寅至日在橫泖客舍憶存沒二子長在潁上幼沒濠梁父子睽離骨肉寒每逢時序輒辛酸濠梁逝水聲鳴咽箕潁荒原路杳漫家廟蒸嘗難僃禮客鄉寢食敢求安海隅兩度逢南至坐對梅花强自寬和錢思復過真淨旭公房所作短褐長鑱隱士風蒼顔白髮瑩雙瞳池邊駐馬邀山簡月下登樓約庾公縱酒放歌聊玩世尋僧問語且談空十年同在風塵際幾見春雷鼓壤蟲秋日過余山幾年不到九山中今日扁舟興尚濃亂後人煙俱落落歲寒林木尚重重追尋故舊皆新鬼曾見興衰是老農我欲卜居愁險絶老來登陟窘龍鍾答胡克溫惠藤枕廣州髙枕織花藤黑白縱橫疊浪層繡褥錦屏寧肯汙蒲團𥿄帳實相應書藏墨子誰曾識夢見周公我未能便欲東山學髙卧不堪華髮久鬅鬙又鐵冠髙人鑄鐵作儒冠雅製由來出杏壇剛氣未輸逄子掛鏗鳴政合貢公彈山林服飾猶多誤霜雪頭顱却耐寒野老初非真御史有時怒髮也相干感橘伊昔洞庭風景好滿林秋色類春光后皇嘉樹深培植巴蜀仙翁久遁藏晉帖特書霜未降吳姬解道手猶香踰淮不奈多為枳應望江南憶故鄉黃岡賈彥德碧梧軒百尺青桐覆短牆重重車蓋翆隂凉北平甲第停鸞鵠東日高岡起鳳凰風度綺窗春弄影露浮金井夜生香綀衣麈尾蒼苔磴遲子清談送夕陽賦鄞士梅隱萬玉林中一草廬市聲不到此幽居孤山處士曾通譜秦隴行人獨寄書瓦甕酒香春動後石橋屐冷雪晴初髙情迥出紅塵表不比桃源禮法疏蟻術詩選卷之六
