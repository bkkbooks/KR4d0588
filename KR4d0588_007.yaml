front:
  text: 蟻術詩選卷之七
  hash: sha256:c5b5e936d1336866588fe6bf6a83d16042c08ecaaa7e21d93b938838facb36ba
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0588_SBCK_007-1a}
body:
  text: 元雲間邵復孺著明新都汪稷校七言絶句見梅懷錢南金東風吹鬢酒㳙㳙拄杖看花又一年怪底江淹容易老幾回南浦送春船早春鴛湖夜泊燒燈過了閒門靜踏月歸来宿酒香何處髙樓夜吹笛曲中桃葉斷人膓晚晴二首槿籬疎處夕陽明簾捲薫風溽氣清竹簟半閒書帙亂倒欹烏葛看新晴濯濯南風入苧衣門前江色映書闈浮雲卷盡天連水兩個鵁鶄上下飛小鬟以墨海棠爲名友人張子正爲之畵以求題嬌枝小小出簾櫳賜浴蕐清淨洗紅一自金鑾供奉後夢魂長在研池中七夕日孫果育丈席上有詩首句約坐客各續卒章爲賦如左白髮年年逢七夕青天夜夜見雙星客樓亦有當時月却照誰家戲綵庭題演上人畵蘭空山楚雨夜淙淙一硯春雲起碧牕却憶扁舟載離思暖風容與渡湘江題危鍊師春溪小泛畵春樹扶疎水接天紅塵不識此山川風流二老衣冠古多是山隂道士船題黃一峯畵扇南州丘壑無今古東晉衣冠乆陸沉便欲相從二三子滿船載酒劇論心陪曹雲西翁携妓泛荷舟中次韻蘂宫仙子蒨霞粧太乙眞人白苧裳獨欠湘靈来鼓瑟冰絃􅍓􅍓按清商紅藕溪頭白玉磯畫船載客憺忘歸􅋖姝散得天花亂不敢飛来著羽衣明日曹安雅翁約席上諸公再放蓮塘席間次韻老魚吹浪𧺫層瀾六月陂塘特地寒花底畵船人似玉忘機鷗鷺亦貪看花間玉露夜生香淨洗冰肌不受粧三十六陂還有約定携羽扇看新涼次韻荅衛立禮元旦之作鬢底新霜白未眞情懷已似老来人春風獨自無崖岸委曲相尋白㲲巾桃源畵卷人間不識武陵春獨有漁郞認得眞只作曲江風景看殘山剰水尚精神松竹卷子華頂蒼寒松五粒渭川風度竹千竿長安陌上看花客不信山中有歲寒雪山便面山中茆屋四時好雪裏開門心眼眀小童沽得前村酒須著溪翁相對傾春日和錢南金韻溪上東風散草芽去年曾此共看花至今留得行春屐猶帶西園徑裏沙次荅汪子翼進士嘗爲采石山長三衢學正采石官醪琥珀黃柯山玄璧照人光芸香閣上無塵事鄭老詩成醉欲狂同曹雲西翁泛舟過干山松篁兩行遶溪灣一舸逍遙任往還藜杖幅巾林下去野人疑是古商山弭棹溪邊問老漁雨中歸路晚糢糊九峯三泖人家外髣髴烟江疊嶂圖賦孫果育丈千山小隱清宵分榻聽疎鐘白日看山倚瘦笻想見幅巾蕭散處層層樓閣萬株松壇上藥罏時進水佛前燈火夜然酥儋州老子前身在不比尋常醉道圖卽景一秋兵革競紛紛山下人家晝掩門昨夜南鄰雞犬閙又傳吏過石壕邨次張漫亭遣興四首滿壁鑚書嫌脉望巡簷設網厭蠨蛸悟来物理如人事準擬縁橧結小巢僧舍看雲歌欵乃漁鄕對月舞婆娑山中住乆忘塵世不道桑田變海多南渡承平無復見中原喪亂又重看白頭父老談興廢曾識漢宫承露盤身到天河惟博望功成漢室有淮隂一時凛凜英雄氣千載寥寥去住心從軍過太湖上梅花正開與顧允中趙君式登山縱歩和韻三首銅坑山下野人家信歩看梅石逕斜二月江南春寂寞東風不管路傍花曾到咸平處士家幾畨花壓帽簷斜如今老眼風塵際不敢分明看此花春光欲動客辭家戰艦縱橫破浪斜范蠡湖邊重回首五陵不是舊時花挑菜美人圖記得行春出灞橋蹋青挑菜總嬌嬈如今老眼看圖畵翆袖鴛鞵乆寂寥和錢思復春日口號二月江南白霧昏人家日日候晴暾踈林敗屋春無主燕子歸来若箇村己亥二月晦日寒食無錫東屯舟中澷成薺麥青青殘柳黃兵餘無處不村荒惠山南畔逢寒食回首松楸路杳茫客樓春日東風吹夢到溪頭溪樹依依緑水流斜日小橋扶醉客逺煙芳草釣魚舟西湖小景扇畵橋厯厯樹斑斑蘇小紅樓紫翠間烟月不知人事改夜㴱猶自照湖山香雲室牕前嵐氣博山罏壁上晴光海嶽圖一夜梅花橫紙帳暖風吹夢遶蓬壺題曹元博壁間馬文壁小畫巖谷幽閒雨露深翠烟長護讀書林春風長養承平樹期爾莬裘歲晏心題項錬師山房倪元鎭小畵空同山下無名樹秀葉飄颻翳翠霞移向玄都壇上種春花開遍玉皇家題夏頥貞所藏王睂叟真人馬逺溪月堂卷憶過餘不音浮玉麈山開玄堂下水潺潺只今惟見溪頭月白鶴沖天不可攀題扇寄鄒君顯浣花溪上堂依竹采石沙頭月滿船鱸蟹熟時秋正好放歌載酒白雲邊君顯荅賦再韻以寄情到澷題秋後扇興来欲放雪中船三江近信丹楓外一夜相思白鴈邊一峯道人畵九山雪霽大雪澷空暗九山晉人遺跡杳難攀老仙只在扶桑外借淂瑤京鶴駕還題墨竹江村蠶老柳花香楚楚新梢出短牆却憶黃陵廟前過澹雲疎雨映瀟湘李雲山畵秋林晚歩疊疊青山黃葉村夕陽喬木幾家存幽人占淂前溪住不是桃源定鹿門梨花十二紅雨過東闌澹蕩晴飛来和恨寂無聲宣和殿下清明後曾向花間見太平夏士安家董元小寒林徂徕山頂千年樹曾及承平雨露恩幾度長空飛霹靂鬼神猶解護靈根辛亥中秋橫溪菴客牕對月口號時長子在潁㓜子在濠皆無見期客牕孤坐過中秋病骨支離雪滿頭潁水濠梁千里外一方明月照三州桃花五色子灼灼繁紅錦不如東風依約舊玄都劉郎老大無心賞付與春巢五色雛横溪晚歩野老無家寄海村草荒秋老失柴門鱸肥蟹壯無勝侣憶殺家園老瓦盆經旬不過石橋隂幾夜雨多秋水深美人迢迢望不及朗歌采芹傷我心懷野舟客鴻鴈風髙秋浦凉芙蓉花開紅錦張去年短藜携手處萬頃黃雲秔稻香停簫士女圖花前月底不勝情欲度伊州又不成若見盧郞年少日等閒吹作鳳皇鳴息齋李使君自號廣陵醉客其守呉興日郊行見民家小湖石名蓬花峯玲瓏奇秀求之弗獲乃畵爲圖且書其意以識不忘客有持以求題者苕霅溪頭石一卷廣陵移入畵圖傳崑岡烈熖誰能奪牛李相看亦惘然杏花宫女花攅金屋雨嬌嬈依約東呉大小喬莫問中原舊春色西陵烟樹正蕭蕭柳隂宫女御柳娉婷拂畵闌當時浪說楚腰鸞君王莫遣兒家學千古天生只小蠻牡丹士女國色明粧映綺䟽晝閒隨意踏庭蕪洛陽春事今黄土忍看承平士女圖薝蔔士女緑牕睡𧺫晝遲遲薝蔔香風透玉肌却憶芳園春夜飲花前微醉絶纓時秋懷故溪三泖西来花滿園衣冠人物小桃源風流王謝今陳迹燕子飛来只斷䰟江上秋風吹客衣芙蓉花老客思歸荒煙亂艸斜陽外夢遶前村舊釣磯元日試筆賀年鄰巷雨初乾把筆書牕墨尚寒忽見東風到門外似將春意入毫端茅簷春色年年在蓬髩霜華日日新世亂敢論生計事身閒猶是太平民上巳日泊舟崑山縣城北十里顧墓田家風暄日麗野花亂開邂逅父老爲設尊俎相率縱歩春興横生乃爲短述以紀所見崑山城北路澷澷芳草連天雨乍乾柳緑花紅寒食近春光不在故園看廢宅荒池鎖碧苔桃花無主爲誰開舊時燕子知人事飛過雕簷竟不来蠶豆花明遶路香雞桑葉暗翠隂􅋽相逢野老留雞黍尚覺芳郊引興長呉女傷春晝掩扉猶將膏沐媚春暉逢人自把金錢卜不信征人竟不歸曹園看梅西園玉樹老風烟離立盈盈不記年昨夜東君又披拂疎枝冷蘂亦嬋娟揚州紅蕚舊風流東閣何郞昔俊遊羌管數聲春拍塞移宫換羽不勝愁石橋流水夜涓涓時度寒香逐澗泉月落參橫疎影亂羅浮春夢達牕前貞溪初夏次南金韻雨後林深竹筍肥渡頭風急柳花飛柴門不掩緑隂靜人在閒牕試苧衣巡簷燕子掠晴絲隔塢茶烟出院遲草色入簾人不到午風吹暖夢回時棟花風起漾微波野渡舟橫客自過沙上兒童臨水立戲將萍葉飼黃鵝小巷繅車霜繭熟前村社鼓野人来鵓鳩聲在樹隂裏竹下柴扉晝不開蟻術詩選卷之七
