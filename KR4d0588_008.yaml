front:
  text: 蟻術詩選卷之八
  hash: sha256:ad5b00a6c2a39e09655793727f008469bad23a6c7c70c84e94a64c3b24194f09
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0588_SBCK_008-1a}
body:
  text: 元雲間邵復孺著明新都汪稷校會合聯句至正改元余寓虎林三閱月南金授業茶院孟冬余歸而南金亦還溪上夜坐縱談念不可無述以紀此會四十韻乆别情懷在復重逢意氣添窮途仍逺役南吾道豈終潜遲暮身何𥙷復艱危首尚黔客情鄕態别南人事物蕐兼豹隱曾誰見復雞羣適自淹故交深閥閱南髙誼薄閭閻歳晚詩無恙復更遥夢屢瞻盍簪長此地南剪燭近前簷近況俱相問復幽期巳素占真成談亹亹南更復坐襜䄡弱冠交游早復通家學問漸訂頑唯汝益南知巳不吾嫌春浦隨風鷁復秋堂滴露蟾楚蘭愁共擷南湘管醉重拈村市魚蝦美復盤餐筍蕨甜望雲歌白紵南蹋月認青帘靜賞花當户復微吟草入簾平煙孤野濶南落日九山尖竹影棋枰潤復苔痕屐齒黏風流元不算南文采頓能忺芸業猶生計復瓜田僅養恬索居期自奮南微祿覬同霑俗薄輕遺佚復時清媿孝廉每驚巢幕燕南殊比上竿鮎屈賈時多忌復商韓世不厭固窮君子拙南競進小人憸璞玉甘深韞復鉛刀苦較銛淳風難返古南澆態日趨炎汨汨知何益復嶄嶄獨好謙富應同土苴南貧不厭虀鹽暴白心如鐵復雌黄口莫箝妙年咸仕版南長晝只書幨坐欲彈冠𧺫復耕期束帛覘壯懷從曠達南短髮任鬑未屬麒麟畵復恒韜虎豹鈐淹留頻撫髀南慷慨亦掀髯但淂襟期在復何憂歲月殲匆匆投井轄南忽忽報郵籤江海無忘險復冰霜巳戒嚴詩篇相砥礪南友愛辱鍼砭復編校遂生亭聯句有序惟昔有元後至元二年歲丙子十有一月冰霜沍寒信宿不解晚雲漏日朔吹凛凛殆不能任雲間貞溪曹貞素翁設酒肴會親友於其家之遂生亭燎以榾柮沃以醱醅脯羞循序以進少焉衆始晬面盎背歡情甫洽翁乃呼童出楮札率客聮詩爲樂而命余呵陳執筆以書於是意况咸適情文藹如迨夜分酒闌凡淂句百有甘而章乃成此吾鄕疇昔清事之一也翁於予爲外族從祖有老僧曰自聞熏師翁之從弟也安雅翁洎弟世長皆曹氏於予爲外族諸父錢南金陸伯翔伯弘皆外姻也主賔凡八人後此卅餘年諸老相繼淪沒存者惟伯翔及予亦皆年踰耳順乗白昏耄中經干戈屢變世道衰微二翁故居悉蕩爲丘隴求其遺跡亦復蒼莽雖流涕痛哭莫及矣洪武巳酉冬偶與元博弟話舊及此而博乃能襲藏舊藁展卷瞭然如昨日事不啻對諸老於几席間也然曩者所作一時淂句輒寫意度先後罔計倫敘此於詩法爲不合博乃㽞藁求余銓整庚戍歳冬杪齋居聽雨乃爲校正而編次之中復有所取舍於是文從字順而意趣斯足遂手書二通其一併元藁歸之元博其一留吾齋以供暮年觀感爲承平嘉話且俾予兩家子弟知鄕之先輩風流文采若此吁物換人非斯文掃地後之人非特不能繼前脩風度亦將不能知而言之矣可勝歎哉庚戍距丙子爲卅五寒暑云是年臈未盡五日小溪吟屋書深冬鼔大籟極寒抑新陽貞素凍痕固封坼暝色浮穹蒼南金斜暉射屋壁嚴飈襲衣裳世長氣候沍昕夕景物惟冰霜伯翔幽居絶蕭散喬木相低昂自聞長林展圖畵踈松奏笙簧伯弘經時歲云暮撫事心亦傷復孺朋来溫重席衆喜累十觴安雅窓梅弄踈影盤蠟摇寒光翔竹罏榾柮火栢子氤氳香聞豆籩旣無算肴核復屢將弘野胾雜鶉雉溪腴間鰷鱨長翠罌玉蛆凍犀筯紅肉僵雅偉哉青雲彥會此白石房南盍簪意巳洽淂酒氣益強弘世道乆澆薄古意殊荒凉復真情恱親戚嘉會非尋常素髙才貴瑚璉妙語鏘琳琅南太原與五姓燕山尊十郞翔阿翁正矍鑠我輩俱頡頑長宗族互有託禮貌詎可量雅舟車逺無間雞犬遥相望聞九世同安居百年有餘慶復兒孫等鱗次兄弟列鴈行素賴有北道阮况得共被姜雅鳩杖祝勿咽兕觥介無疆翔晨昏足甘旨歲時謹烝嘗雅臭味亡薫蕕優劣何粃糠聞躬勤樂耕釣志儉忘膏粱弘招隱及巖谷濯纓下滄浪南清風𧺫竹逕朝陽耀梧岡長歌長擊瓦缶興酣據胡牀素秋花照籬落春草生池塘復望重詩禮庭義薄名利塲南學術本鄒魯治化沾虞唐素百兩重聘國千金戒垂堂翔雄觀局四海壯志馳八荒弘恒鄙貨殖貢豈羨干禄張雅詞源尚屈宋書法追鍾王長奇材任犖犖雅量須汪汪聞心胸藴星斗頭角嶄珪璋弘黃麻珍世賞青氊寳家藏翔松柏抱貞秀蘭蕙含芬芳長擬儕谷口鄭弗媿商山黃復曵𥚑或混俗衣錦寧忘鄕南王掾元不癡酈生乃佯征婉孌談論濶輾轉理義長素㑹合益膠漆契濶母參商素笑語寒稍弛歡樂夜未央南真性本寥廓幻身且徜徉聞聯詩出雅頌看劒生光芒長焚膏照無寐瀹茗搜枯膓聞人情咲失馬世利嗟亡羊翔惟兹一餉樂勝彼終日忙雅所欲論文字初不事酒漿素耆英固難繼真率或可方復坐醉春滿席𧺫舞月在梁南宿氛息廣漠晴暾炫扶桑弘分袂重慷慨驅車走康莊雅猗歟紀宴集斐然成文章復舟中聯句洪武庚戍臘月八日余與嚴陵邵復孺先輩自雲間之澄江蚤發向呉門挂席波上甚適也因相率聯詩以攄客懐日夕過蘇臺窮其韻而成章凡得句百有廿興之所至罔計工拙江空歲晚孰知吾二人清苦若是哉諒天地必有同其情者隴右邾經仲誼識歲晏冰雪稀天空水雲濶扁舟戒行李邵逺道舍祖軷度泖淩鷗波邾橫江蕩魚沬晴暾弄熹微召明霞入㶀㵧村迷辨烟樹朱林響聽風枿連隄半隳隤召亂石互排拶感兹物色睽朱疑若鬼神奪蕭疎見古寺召狼籍遺壊闥替戾塔語鈴朱跏趺堂散盋誰將拂盤陀召我欲叩菩薩了知空卽幻朱奚謂悟始達觸景人事非召經途客心怛憶昔兵構患朱念此民苟活流離且無家召瘢痍仍有筈虎寜泰山畏朱雞豈武城割待旦苦漫澷召書空愁咄咄旋瞻太平治朱遂及阨運豁造化終含情召生聚母蹙頞夏鼎燭神姦朱秦鏡走妖魃吾徒恒汨沒召斯世暫超脫侯門斂長裾朱甿里混短褐棲遲甘海陬召飛騰阻天末企望麻姑鵬朱悵閔李斯猲禍福信倚伏召貧賤逃天閼虗名自成累朱逸氣孰可遏頻年頗好道召長日頓忘渇琴心舞胎仙朱茟陳馳叱撥幽蘭紉佩纕召芳草結屨鞨瓦彞香屑沉朱甆斗松蟠栝衡茅讓山藻召團蒲勝罽毼芸編飽樷螙朱槎梁漏羣獺野鳥資笑歌召林蜩供巧掇晞髮傲三沐朱充腹儲七糲荷風揮白團召桂月慗緇撮掃蕐坐裵囘朱問竹行跋躠衣防棘籬鉤召屐慮蘚磴澾樵漁從往還朱鄰里謝喧聒童沽􅌤持券召客醉狂褫襏卒歲每怡愉朱安時靡乖刺徒歩猶履囏召清談巳囊括獰頷固可探朱猛鬚慎母捋逍遙憚拘撿召老醜倦塗沬涸鮒肻貪餌朱罷驥恥受秣澹然忘戚忻召展也釋嗔喝谿翁故相能朱隴士今有佸及蔑繼邾盟召翦棠思召茇北征唐爾愧朱南音楚誰撻澷歌車遙遥召何歎流活活周道尚逶遲朱呉臺空嶻嶭五湖悁陶朱召八陣失諸葛載陽麋縦遊朱無詠狼㚄跋舊夢巳銷沉召清氛尚轇轕顔跖悲蒙莊朱羿奡嗟魯适君子懐游從召城闕記桃達斯辰當臘蜡朱于夕叫寒鴰嚴飈轉帆席召斜暉在篷笪旣空鳧鴈聚朱徒詠鱣鮹鱍心驚玄㝠沍召目佇青陽潑願同松柏貞朱不改薑桂辣搔首一長唫召乾坤莽囘斡朱蟻術詩選卷之八
