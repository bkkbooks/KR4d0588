front:
  text: 蟻術詩􅃟卷之一
  hash: sha256:fafeca9a1f908a29f698b2133824fe0276c7f5e6a0af832840ae97968c05b087
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0588_SBCK_001-1a}
body:
  text: 元雲間邵復孺著明新都汪稷校五言古風秋懷金風應商節庭樹生秋聲況􅂧踈雨過莎鷄振前楹客居在城市朋從少合幷雖無山林賞乃亦無俗情芳時屢消歇身世坐無成廣庭散短策逍遙塵慮清陶然發孤詠聊復遂􅊭生皎皎青樓月流光照幽樹當時樓中人邂逅感相遇娟娟耀華年粲粲美風度黽勉在同心誓言金石固離居幾何時玄髮各巳素豈無陽春心去去􅀂朝露芳馨苟不存臨風歎遲莫依依漢南柳秋至多悲風搖落在一息坐此颯爽中衰榮有天運物力詎􅀎攻桓公豈不偉乃亦歎其窮嗟哉山林子出處將無同今日秋雨霽廣陌后土乾出户欣􅀁矚紅塵滄海寛宕子此行樂朱顔撫雕鞍次韻王彦強監稅中秋不見月髙樓有佳人長歎惜流景漫漫夜何其耿耿愁莫省昔爲陽春花今媿眀月影徘徊望雲端悠然素心冷又次九日韻佳節坐無緒行憩嘉樹隂秋花澹相對慰此遲暮心悠哉美人逺輾轉相思􅅧天風日夕􅁸長歌良不禁夏夜紈扇􅀉晚興竹牀生夜凉大星在南極新月照東廊稍隔茸泖路逺懷荷芰香夜深屢移枕清漏一何長林端鵲尋巢屋角螢照席風生銀漢凉雲散玉露滴坐乆氣益蘇心靜神自適鄰鐘忽迢遞相與破幽􅄫夜月白霜滿地山家寒未眠人影在門外梅花遶牕前村舂自斷續戍析相後先沈吟惜良夜那􅀎遲芳年謁青龍文廟鎭市近東海人煙迷逺郊前朝有勝迹遺碣在荒茅民識靑龍艦樹傾黃鶴巢崇臺近􅋖路擬尋王可交地有王可交升仙臺雪落暮潮上雲橫春樹迷刺􅂳龍江口解榻鱣堂西舍采重典禮采芹㽞品題風塵正旁午教養詎可稽和孫果育先生曉行池上韻逍遙碧梧井顚倒白苧裳荷淨雨初過水清心益凉晨風却羽扇秋意滿藤牀了無塵中趣良以遂行藏晚望五側體出户縱兩屐略彴不可度興到意未適且復信晚歩野景頓慰目萬壑倐巳莫興盡始欲返解后有􅀁遇父老謂有役耒耜出逺路況乃積水涸岸脚稍復露觸物卽勝賞蹔爾釋俗慮竚立望不極暝色亘綠樹齋居讀書傚晦菴先生體二首端居掩柴門四月忽巳暮物色催年華綠隂滿髙樹雨除軒牕靜宴坐屏百慮清風激然至好鳥聲亦度愛兹羣芳秀幽景欣􅀁遇瀟灑契心賞澹焉忘世故清溪一雨過沃野桑麻成屬兹長養節􅁣彼少壯情庶類各有適微生澷無營窮居在田里胡􅀎事虛名俛仰狥幽獨微唫散新聲百年總役役且復遂吾生早春次陸伯􅊼韻春生海岳菴冰消建安瓦山鍾隔遙林漁􅐟􅊌寒野逺客忘馳驅懐人賴陶寫書燈尚鄰雞塵陌巳官馬陳元茂別去十年扁舟由山隂来有詩敘懐次韻識喜二首向来秋懐詩絶響斯寡和憶君鼔朱絃對客汎白墮歌長竹間醉興盡花下卧有時舞婆娑褰衣緑陰破契闊日以邁交道日以􅉛緬懐載雪舟放情換鵞池山川固無恙觴詠長􅀂兹流水日東逝何以寓相思用上人萬玉軒琅玕遶禪室坐卧空翠間誤疑篔簹谷携入藍田山戒衣蒼雪亂談塵清風還何當往擊節亦以香巖關上武陽太守汪公國良公新安人善文詞書翰峩峩􅂵陽山髙廣出奇觀千年喬木存蒼翆拂雲漢名家多世臣冠葢恒煥爛道統自考亭事業擅藩翰朱絃清廟具一倡起三歎謝庭固多才王羣􅁕渙汗􅀎書事魏晉筆陣妙莫傳清絶籠鵞經窈窕臨河篇神交千載上八灋日以全錐沙得利􅄊墨沼龍蛇騫向来鮮與趙巳擬摩其肩記名金石間良以永斯年春風滿庭戸三槐日芬芳雨露足生意清隂蔽髙堂彼美蘭蕙花婉戀有國香良時拜家慶綵衣列成行孔庭富詩禮竇氏多義方懿哉德星聚霄漢生光芒次宇文子貞别駕見貽韻泠泠苕霅溪清㳤世莫比中有泗濵磬籍籍韻人耳采之貢廊廟秀發鈞天微願言正始音行贊元化理鯤􅈚多化鵬鷄羣有孤鶴偶兹樊籠困所志在寥廓豈無青㝠姿迢遞􅀂溝壑知音苟不存清唳何由作熏自聞上人禪房與陸伯弘暮坐偶成郊居絕勝賞性僻如自然時俗非􅀁趨方外若有縁況兹蘭若幽坐榻臨清泉飄然縱心目問法得老禪丈室頗蕭散玅語開玄玄西牕緑陰靜林麓含雲烟逍遥接清景塵俗詎􅀎牽全眞師鄭無用北遊往㫺柱下史翩翩􅘳青牛示彼衆妙門􅆻此玄學流後来羣仙籍往往在北州至今燕趙間斯道良可求鄭師宦門子氣􅄫業乃修行當得􅀁遇逝將與之逰稽首謝埃􅅽長嘯崑崙丘午日曹雲西翁厚堂分韻玉字仲夏暑氣微嘉樹藹􅅧緑詠歸衡門下逍遥清溪曲屬兹午日至悠然對醽醁親戚恒􅃇歡荆楚尚遺俗飲罷仍太息歳月傷局促世情苟驅人母使隨轉燭願言各自愛重之若金玉秋懷擬古用黃伯成韻悠悠渉塵世冉冉傷流光来者日紛靡逝者日微茫巳秋不可春一夕百草黃羣動悉偃蹇孤懷良􅁣慷幽期在空谷於以觀翶翔相看且慰意歡樂未渠央黃仲珍會試囘藩省中有詩留别沙德潤任以南皆次韻持来求予著語美人善窈窕長年抱幽素迢迢遡飛鸞眤眤眄盟鷺蹇修無裏言良人昧情度􅂬娯在一息胡然藐雲路膏雨下灌木春雨濯文荇美人遵江阿中心忽秋冷昔期朝雲臺今􅀂中流艇終焉蓬蒿姿愼勿歎宵永德潤以南又賦以適逺興再和爲荅清景日以邁玄髮日巳素遲迴置鴻鵠曠蕩狎鷗鷺何慙魯淳朴頗適晉風度長歌招隱辭延佇淮南路離離原上蘭泛泛漢中荇春陽豈􅀁私夕露寧獨冷誰其念逺人采之􅀉孤艇曷􅀂遂其息芳馨與時永贈經筵檢討太原陳敏夫幷州古名郡盤踞山河長禮樂盛􅁎晉民風本陶唐清㳤多名家軒蓋相低昂有美元龍豪喬木乆芬芳中宵德星聚文采遙相望盛朝尚文治機暇事探討春明御延閣六籍互稽攷峩峩貂蟬列經􅀖坐論道之子初明經盛年致身早晝永掄對休揮灑更文藻四月十七日偕張彦聖陳景曾李道原郭與仁倪自明遊東岩蘭􅀂分韻淂夏字客居寡歡樂奄忽歲云夏會合無前期偶爾遂閒暇追隨二三子遊憩東岩下杖藜足幽討奚必整夙駕野色隔市橋塵氛絶僧舍屬兹長飬節灌木色相射清賞欣􅀁遇置酒此軒榭談玄岸烏巾林鳥亦驚詫人情脫城郭矚眼仍自訝我生頗宏放乆矣觀物化世道苟難趨端合返耕稼逍遙􅂵桑廬良以竟晨夜彦聖次予夏字韻見貽乃亦次彦聖孟字韻爲荅浮生羨楚狂適意􅀋優孟豈惟事文華矧復愼言行暇日得朋從游心在觴咏睠兹蘭􅀂幽愛爾林麓淨登山竹有題俯檻水可鏡􅁸坐情共眞嘯語氣益勁追尋往事改悵望前修夐論文浩無算行酒肅有令居然豁塵􅁭恍若蘇乆病了無物我情坐見夙昔性杯盤旣狼籍歩屣互斜正重遊當及時山中筍猶盛彥聖再用夏韻見示又和以復我家住清溪嘉木藹朱夏耕鑿頗自適藏脩有餘暇中有韋氏傳素出孔壁下鄰好皆相􅂬興到輒命駕從容歲時禮往来東西舍髧髦總好書冠首或􅀎射暄風登春臺涼月嘯秋射衣裳時使然登望俗􅀁詫縱匪桃源深亦有漁舟訝樂矣忘吾憂逝將與之化維時巳種秫卒歲競登稼期君草堂遊剪燭巴山夜再用前韻與彥聖景曾論詩騷壇有清音翕􅀂奏韶夏宮商相激昂合止適休暇一倡每三歎萬籟風斯下夜深􅃫来儀屢飭緱嶺駕飄風忽大和桑濮俱退舍初疑矍相圃妙中見奇射再疑廣寒宮羽衣滿臺榭品題得賞音終然匪虚詫􅀁貴正始音不受淫哇訝采之貢清廟自足驗風化陽春與白雪生意在禾稼行當集大成鏗鏘振良夜景曾和孟夏二韻見貽復用孟韵追道向者泮林聚首止處之誼陳子冬日溫可愛􅀂趙孟不競聲利塲􅀙容抱􅚨行我昔遊泮林屢歌伐木咏識君稠人中心􅀂止水淨揆余素暴白相照兩眀鏡君如雖處囊不屑露鋒勁我猶絅尚錦韜晦極􅅧夐折􅆎鄕里兒終媿彭澤令一朝共引退似失膏盲病臨川濯我足逍遥遂天性重逢無厚顏自謂出處正願言若松栢保此歲寒盛僕年来塊處閭閻緬懷平昔託交粗多然意氣相期者指不多屈因景曾詩中論及交道就韻以懷數子隔絶走昔重交際流汗􅀂炎夏結納天下士寢食􅀂不暇蜀王藐餘子卧之百尺下王彥強成都人晉秦早穿楊近命武昌駕秦景容太原人傅子經濟才多士避三舍傅子初鄱陽人有美彭城宣雄辯氣如射宣伯褧徐州人錢郞早明經翰墨照臺榭錢南金華亭人落落東甌陳特達衆􅀁詫陳元禮永嘉人􅀟湖王文學識晚互相訝王昌言檇李人􅊭生此􅁆子因之氣質化況兹得孟公稂莠見良稼闊絕殊有懷起舞雞鳴夜送傅子初先生之信州錄事去年十月交冬淺寒輒沍客居江城館燈火在風露君從錢塘来舍舟縱游􅇍一見心爲開問勞出情素番陽與雲間相望千里路會合匪偶然況是夙􅀁慕江左古世家粲粲美風度射策衣繍歸春生五陵樹文章天機錦到手眩昬瞀坐談極疇曩歡然獲知遇自冬更徂春不間朝夕晤君於稠人中走獨心所寓傳舍稍密邇泥濘亦枉顧開􅃃析疑義沛然決東注賞音風雅間神會見天趣平生耿耿懷不爲流俗具因君頗呈豁欣快未易喻誓將與此老結納視親故欵洽豈有極忽復報􅀲戍録曹雖民職未足展抱負行者崇令徳政化藹先務分違坐契闊引領不可遡中年別親友作惡若深忤梅風彭蠡寛歸鷁愼速渡後約仍綢繆中情尚􅀎賦芳洲蹇誰㽞懷哉美人暮題傅伯玉来青軒走昔重慶下總角拜而翁聞之祖父言此老臭味同與我爲世契家在兩山中聞山在何處僻近滄海東先生隱其下邃若盤之宮開軒納蒼翠䨥螺鬰茐茐拄笏以致之嵐氣浮雲濛雲牕筆硯濕雨檻尊櫐空春花與秋草四時自青紅夏暑熟桃李歲寒斂禾穜門深俗駕返迥有前賢風兹來三十載念之感吾衷先生雖隔世有子傳箕弓家氊一經在未覺吾道窮況我與伯玉少小相磨礱及玆坐遲暮髩髮各巳蓬手澤敬􅀁存矧敢弛前功青山不改色軒檻猶玲瓏排闢匪寓言生意那有終何以志不朽立言在諸公顧惟通家好詎􅀎忘效忠􅅺塗適偃蹇物理還窮通善保堂構心禮法慎爾躬方来當有振鑒此以自崇瑞閒雲開士雲􅅧䖏髙人悟般􅀂斂歩問棲息㝠然百念靜隨處可面壁況兹故山深雲氣窈無極雖在三界中若與塵世隔向来出山時千里縱杖錫西上醫王城北峯文殊域雄峯快南遊玉几眇東歷周流歲年邁㝠然屏心迹歸来白雲在此見非舊識出山固無心在山那有役雲我今兩忘有相同木石山河眼底􅂠無復著五色是雲夲不深聊寓幻化質今兹大自在􅀁向罔不適此中有妙趣欲語難自析我生墮世網性本慣幽􅄫終當從之游瀟灑共朝夕復此清淨根􅀡指不容力昨以靑鏡褐帶􅀉郭志道先輩暇日貽二詩以彰􅀁貺不啻引玉之慚次韻爲荅客從渠國来遺我火齊銅蛟螭結其背文藻交青紅一展􅀟眼明秋江送飛鴻俗狀媿不稱什襲寳匣中念我平生親潔白與之同持贈見題品坐使光價隆重君有僊骨長年駐顏容豈知晦迹士玄鬒成飛蓬縞帶不縁辟出自鮫人杼闇闇蔽光華纖纖衒紋縷服用必老成褒博邁前古乗之良有餘踐履有門戸一御君子身居然稱章甫歩趨重禮貌周折中規矩荷君不鄙夷約束還見許立朝對賔客老矣更延佇春晴次申屠仲權進士韻澤國􅌅乆雨暮春生晝隂羣芳悉委翳何以忘憂心況迺􅅺潦阻朋侣少盍􅆪晨興矚新霽拍拍春流深散策茅簷下對酒還自斟許身沮溺徒逍遙浣塵􅁭春山在屋外照映緑水灣暄風斂宿靄秀色若可攀恍疑桃源路窈窕非人間欣然寓游目及時爲開顏花香渺莫卽引領徒懸懸緬思繁華節光風汎山川姢姢渚花媚恰恰谷鳥遷郊人戒農務芳草催詩篇于時正興矚擊壤聲相傳沉憂感物色㤗道何多愆人事蓋有忤天運豈􅀁偏安得伶倫竹感召和氣還大鈞忽駘蕩生息斯可全願言陶化景調燭在時賢奉􅀉海鹽知州李正卿先生往歲事行役路入錫山道公務有程限不暇致幽討期會邦大夫迺得斯文老班荆草莽間一見顔色好􅂳頭接杯觴彼此露懷抱泚筆賦黃花屬意出天造暇日再升堂披豁見文藻學問仰前列結納悔不早􅀁惜吏事稽告別殊草草嵗晏歸故林藜藿强自保雲霄絶躋攀世路迹如掃文星忽移次屢􅁸視蒼昊雖乏彈冠資庶淂慰枯槁感激良有懷心焉惄如擣海城逺邊烽􅀚瀾近三島惠然澤斯民終以養吾浩會當挐扁舟濶絶重傾倒贈星數術士陳秋巖天上種白榆豈使塵世知人心極天理乃有歩天詩好風或好雨未易以意推晦明與躔次側候無愆期人身列三才照耀匪􅀁私曆象示禍福鑿鑿信不欺陳生得玄祕傳授有心師􅃌掌披周羅隱顯見豪釐我生五行內貴賤詎可移因子許蔗境遲暮不復疑人身小造化中有天地理形氣苟相遭緫合大易旨籌䇿運乗除變化亡􅁸止千古發幾微乃淂􅀽與李擊壌集大成煥然具衆美經世浩莫量論命同一軌微言明晦吝勇決至生􅂮擾擾六合中萬類莫逃此相逢叩浮生妙語瑩如水徃哉抱韋編㝠心究終始田家四時詞爲九山學稼軒作大鈞播羣品生意滿寥廓晨興矚南畞鳴鳩在林薄婉孌起遐思良時戒東作燒痕日以囘野水日以落荷鋤豈辭勞勤動有餘樂臨流歌􅃎風心跡欣􅀁託迢迢谷水陽山勢西南翔平野萬頃間林巒互低昂屬兹長養節緑隂滿虗堂耘耨旣休息藹然苗稼香端居無物役朋来時命觴餘力事編簡先民逺相望廩秋殞霜露嵗功行及時刈穫遍原野萬寳紛陸離童稺日夕喧欣然不知疲聖門貴道德扵焉鄙樊遲無􅇣示艱難拳拳戒先知微生巳忘世舍此將安之鬰鬰嘉樹林宛宛溪水曲幽人此躬畊良田遶茅屋歳晏農務休我􅅒羨穜穋蜡酒歡里閭相與分景福變遷吾弗虞治忽吾亦足永懷陶公廬無忝鄭子谷戊申仲冬兒頴爲館人􅀁連得罪繫獄朋游咸謂必老夫叫􅕡乃可昭雪由是衝寒扶憊戒途凡越旬始抵石城道間記􅀁見得詩如左澱湖夜宿郭家舍早行陳墓村霧歛湖蕩白逺水浮晴暾兵餘聚落廢草木蕩不存􅅖橋得野店刾􅂳具晨餐向来經行䖏恍惚不可論川原莽無際黯然消我䰟豈知衰暮景值此天地昬吳門日夕望呉門荒煙翳寒草泊舟問何處云是葑門道三年百戰餘人烟迹如掃舉目山河異恍􅀂天地老殘民餘㡬何流離孰􅀎保仁者不可追誰其念枯槁嗟哉乗除理實匪人力造茫然夢寐間惆悵對蒼昊新安鎭白首念􅃇遊瞬息六七載興衰反掌間宿昔魂夣在向来太原公襟度絶爽塏大開青油幕籌策善掄采談笑合經綸事業有期待入幕匪郗超羅致慙郭隗重来弔遺跡驚心變桑海故舊散如雲我獨毛髮改城門嗚咽水似恨有遺鎧天運不可量鑄錯詎􅀎悔沙湖凌晨出沙湖杲杲寒日赤望路指西南趂風挂帆席行行數里間舟底盡沙磧歲暮寒水落過者總煩劇篙師力支撐進寸乃退尺叫呼問鄰舟始淂指􅀁適中流植􅍉葦表以􅅧水迹由兹遂無阻四望始充斥迢遞達岸傍囘首日已夕嗟予匪徒行衰謝牽物役人生苦多虞仰羨投林翮義興朔風中夜􅁸白晝生晦㝠舟行向亭午問路循郊坰日色稍漏歷歷崗巒青地出陽羨西亂後皆凋零良田乆荒􅁾聚落如晨星乃淂張生廬回塘水泠泠少年頗解事肅客開林扃燒薪具湯沐置酒陳罍缾具言兵火事慘惻難爲聽余亦感其意強飲忘􅍦醒明發戒行李指㸃仍丁寧前馬鎮水行數百里今日始登陸老来筋力微徒􅇍窘局縮暮抵前馬鎮人􅈣稍蕃簇琳宮半摧頽猶是前朝屋隂隂寥陽殿仰見貌像肅吁嗟禮樂壊銷毁日相逐􅀑神依人靈至此亦傾覆出門投逆旅展席成地宿江東形􅀔髙土室頗溫燠牆隈卧兩牛對月寒䑛犢因之傷我懷中宵淚盈掬溧陽戒車屬昩旦霜露猶淒淒折旋荒墟間石逕迷東西第宅燒焚盡頽垣互髙低北風振林箔寒烏向我啼逶迤出官道􅀁見愈􅃤悽南来多遷客一一援子妻嚴冬犯冰雪面目俱沙泥歷險復凍餒矧敢勌攀躋皇天有恒運何以慰黔黧擾擾六合内誰􅀎遂幽棲七里山我生本無營垂老值逆景山水性所樂邂逅心目逞朝来經行處林麓頗深靜松篁雜泉石豈不慰馳騁一見暫解顏愁慮終莫屏郍􅀎似平昔到眼輒記省始知乾坤內萬事如過影患難偶相遭定力未深領曷若忘吾憂陶然造眞境分界山亂後喬木盡新植纔拱把惟時搖落餘山色亦瀟洒至兹頗險峻宛轉曲崖下路出分界山神思欲傾瀉僅有古廟存斷碑仆荒野緬思承􅊭年處處雞豚社衣冠不復進何由㫁風雅我雖一腐儒自謂賞音者胡然迫物累對此失陶寫官塘暁行犯霜露驅車上崇岡四顧人煙稀日色浮蒼涼山家竈無突炊烟滿衣裳出門復風沙老眼終昧茫父老爲我言時事殊可傷此􅀖蕞是邑右族侔金張粤從亂離始十室九喪亡強壯殞鋒鏑老弱委路傍形勝旣改觀山川遂無光纍纍偷生者榆景何由長語罷長揖去喟然面穹蒼白府君廟道經溧水縣古廟當城隂浮雲映霄漢鬰鬰宮殿深􅁱門聳飛閣穹碑列森森前朝屢褒頌落落正始音國家崇祀典首以民爲心陵谷有遷代造化無古今信知􅀑神徳福善終禍淫馨香苟可薦黍稷非􅀁歆謝亭岡此地非㴱山􅀁􅍓無絶險髙下百里間崗巒互重掩民居稍聯屬兵餘苦勤儉山田固微收況復經歲歉停車謝亭岡暮色昏冉冉風寒人不行遥見燈火颭恍然遊子懷偃􅏝忘拘撿青梗夜寒宿秣陵暁霽度青梗㫄臨總溝壑不啻瞰眢井俯視層冰橫照目光炯炯輿人亦良苦交馳畏肩竝霧昏迷轍迹有力不敢騁我時含車行􅄚滑不憚整殷憂莫蹔置懷抱常耿耿山川不我厭衰晚負清景何當問蒙莊寸心若灰冷金陵亭午寒霧收日色漸昭晰此行旣迢逓身世任曲折四顧逺近間羣峰儼環列峩峩石頭城形勝天地設龍虎相踞盤王氣故不輟鍾山一卷石迥與他阜別山川無情物往往隨變滅粤􅀙典午来禹跡屢割裂豈不祈永延中自仁義缺是知王伯資初不恃險絶誰其罪眞宰惆悵還結舌白首匪壯遊弔古粗可恱唐虞彼何時長歎肝肺􅀬夀靈源上人遊方我生頗宏放素有山水癖胡爲墮世網􅀁願乆未適矧當風塵際及此頭盡白豈如浮屠人蕭散無物役名山勝水間往往快遊歷靑鞵萬里道不汙緇塵迹相逢眀眼士心地渙冰釋夀公山林秀豈憚勤勞力發軔始自兹端可窮絶域設心一以廣􅀁向竟終極了此最上機三界在瞬息歸来烟水間借我半禪席錢塘林子文以星術醫藥畵筆遊食江湖爲題行卷三首璿璣耿夜光􅀁示各有象七政一以齊玄理益㴱廣萬􅀋靈者人命運合天壤儒先妙推測經緯在指掌後世得其文禍福益宣朗我聞賣藥翁夙尚韓伯休避名宇宙內殆亦􅋖者流後来不乏人往往􅁇前脩濟世在隂徳豈爲生事謀刀圭忽通神遂與元氣游古来朝野間靡不重豪素山水擅甲科夙昔著名譽澷漶積雪峯險絶懸崖樹之子法李郭惜墨見天趣幸寫桃源圖艱危淂歸路􅏊女嫠居澄江無後可託親往載之以歸庶盡父子之道且得縣宰給以公文􅆓途無關譏之虞丙辰歳二月廿一日出關宿城南屠家鎮逆旅中夜分枕上紀述示舟中同行者暮出澄江城夜宿屠鎮市身老憚驅馳情真易嗔喜生􅊭兒女債累及衰暮齒婚嫁雖粗償生死那可擬逝者不復追存者詎􅀎巳經營盡人事得失任天理此行未爲迂所願聊復爾同舟得佳侣聯榻忘旅邸去住􅇚殷憂周旋賴知巳鷄鳴客夢迴犬吠征人􅁸旋聞啓重扉又欲戒行李關譏良可虞公檄信足恃吾生旣若浮老境復何止沉㝠但結舌感激還撫髀聞道固茫然忘機亦乆矣何當絶紛埃放情好山水􅀉贈潁上縣令車則明會稽人小兒頴以罪遷彼此公知其非辜每加眄睐東瞻會稽山萬古神禹跡嶔嶇控大荒偃蹇鎮南極蓬瀛屢清淺造化恒鬱積人物秀􅀁鍾不啻崑産璧衰微或相尋生􅗱詎肻息之子經世資製錦蹔淹抑光岳含靈氛終古有通塞孔門有遺訓政事列四科單父坐鳴琴武城􅁸絃歌至今百里間聖化恒漸摩汝隂古名郡先哲屢經過巢由垂隱跡歐蘇鼓文波􅁸廢喪亂後豈不煩撝訶頗聞德化感道碑藹春和願言邁前列脩途振鳴珂微宗事儒素家在嚴灘上衣冠乆淪落喬木亦凋喪平生江海心旣老尚宏放應門賴弱子粗習菽水養一朝坐斥逐夢寐隔千嶂無家復貧病曷異楚囚狀徬徨䑛犢情悽惻􅀝閭望明公憫斯文青眼顧流浪有德彌二天没齒詎可忘贈寫神王鑑堂江心百鍊銅照物無遁形人扵天地間方寸尤神靈不知子都姣有目若晦㝠之子頗絶特炯炯䨥瞳青豪端化工在妍醜任使令凌烟重一代傅岩貴千齡自古賢達士徳義斯可銘慎勿薄固陋更叅相心經􅀉南金絶句朝望茜溪雲暮望茜溪水􅀝窗對晚色懷人不􅀎巳夢中紀遊春澤下楚雨暮江開野花嚴灘釣魚客却上漢仙槎題窠石絶句雲際天籟收石底元氣蟄幽人憺忘歸日暮山􅀑泣金錯刀竹君子在澗谷歲晏服豹韜擬將鐵石心鑄作金錯刀蟻術詩􅃟卷之一蟻術詞選卷之一元雲間邵復孺著新都汪稷校令擬古十首樂府十擬弁陽老人爲古人􅀁未爲素菴先生復盡弁陽􅀁未盡可謂一出新意矣暇日先生以詞藁􅀉示且徴予作旣又獲見檇李諸俊秀所擬益切竒出閱誦累日無厭因悟古人作長短句若􅗦則音節氣槩人各不􅀋往往自成一家至扵令則律調歩武句語苦無大相逺者間有竒語不過命以新意亦未見其各成一家也所以令之擬爲尤難强欲逼眞不無蹈襲稍渉已見輒復違背由是未易苟措兹重以先生之請思索且得十解未知其實能似古人與否惟先生有以敎焉至正二年二月甲子序弁陽周草牕號素菴錢子雲號河傳擬花間春日宫詞春殿簾捲鬱金香逺午漏沉沉桺隂樓前怨紅何處尋沉唫玉溝流水深睡􅁸長門催侍宴情正勌强把鏡奩展露柔荑添黛睂歩移君王猶訝遲蝶戀花擬雪堂夜宿西掖蓮燭煙銷深院裏玉宇瓊樓夜色眀如洗月到紫薇花樹底闌干露重無人􅀝金鑰無聲門不啓􅂠髮蕭蕭尚擁青綾被聽盡樓頭更漏水一聲唱曉鷄人􅁸鳯来朝擬清眞汴隄送别駐馬隋堤路怨凌波背人喚渡正琵琶撥到傷情處又底事便輕去日照啼紅無數酒杯乾再三細語轉首又天涯暮怎約淂畵橈住臨江仙擬無住水檻過􅀨一滴天瓢蠲溽暑夕陽微漏殘紅竹闌乗興􅀝薰風笑驚䨇白鳥飛過藕花叢羽扇綸巾閒到我百秊世事匆匆若耶溪上舊相逢晚来囘首處山色有無中賣花聲擬順菴早朝應制煙樹重重春在景陽宫殿翠深籠寒尚淺千官過處有黃鸝百囀五雲中漸移龍扇鈞天九奏迤邐霞觴催獻笑聲喧霓裳舞遍香烟滿袖更宫花迎面喜新來太平重見杏花天擬白石垂虹夜泊月明消却娃宫酒聽吹笛清寒滿袖向時雙漿載離愁去後幾春風待問柳􅓽囘首三江渡口念西子如今在否上方鐘動客􅂳開别乆􅀉新詩興未有小重山擬梅谿尊前贈妓緑􅁂低低壓翠鈿雙眉彎似月􅃲嬋娟夜涼和袖拂冰絃嬌無奈何況酒尊前歌罷意悠然一聲新鴈過暗愁牽眀朝江上水連天凌波歩萬一故人憐鵲橋仙擬稼軒中原懐古殘陽隴樹寒煙塞草􅃧馬臺前秋老黃河日日水東流斷送却英雄多少西秦笳皷東山􅀉傲萬事付之一笑閒来繋馬讀殘碑又目斷江南飛鳥浪淘沙擬遺山浙江秋興紅葉滿青山掩暎溪灣柴門鷄犬白雲間江上艸堂塵不到老子心閒霜後橘闌斑籬蘜香殘夕陽囘首一憑䦨世事悠悠吾老矣且放杯乾唐多令擬龍州錢塘暁渡晨色動征衣疎鐘隔翠微小蓬莱烟樹髙低潮去潮来呉越恨江上月故依依人老昔遊非愁多春夢稀􅃇相思重見無期蘇小門前楊柳樹􅀿折斷最髙枝浪淘沙錢南金疾作代簡問訊秋意滿平蕪夢繞蓴鱸一江烟水鴈来初昨夜西風吹杜􅀂􅄅渺愁予人隔楚天隅相望躊蹰想􅀿多病故人疎門巷凄涼誰買賦瘦也相如又晚牕過􅀨楊桺弄黃昏不掩重門長條盡是􅃇愁痕􅍦自􅀝簾看晚色無限消魂風􅀨小溪渾春過三分明朝鸎燕又紛紛唯有天涯芳艸怨依􅃇王孫又感􅃇江外􅀨初收江水悠悠􅃇時桃葉去難畱幾度春風楊柳暗不繫􅄐舟别乆减風流夢斷西樓年年二月踏青遊不是沙邊無杜若嬾􅀉閒愁虞美人泖濵泛荷南風十里平湖外夜舞凌波隊米家書畵滿􅂳頭更著小憐歌舞障清愁烏紗不共人間暑别有談元麈近来嬾作斷腸聲只怕花能解語又多情又􅒜張芳逺惠杏花閉門日日聽風􅀨不道春如許老来猶自愛看花及至看花雙眼被愁遮杏花不改臙脂面愁裏驚相見花枝猶可慰愁人只是鬅鬙短鬂不禁春又水仙幾年不見凌波歩只道乘風去山寒歳晚碧雲寒驚見飄蕭翠袖􅀝琅玕玉盤承露金盃勸幾度和香嚥冰霜如許自精神知是仙姿不汙世間塵又壬子歲元夕與邾仲義同客横泖義約予偕作詞紀節序予應之曰古人有觀燈之樂故形之咏歌今何所見而爲之乎義曰姑寫即景可也夜枕不寐遂成韻語時予有予夏之戚毎無歡聲詰朝相見而義詞竟不成云客牕深閉逢三五不恨無歌舞天時人事總悽然只有隔牕明月似當年老夫分外情懐惡無意尋行樂眼前觸景是愁端㽞得歲寒生計在蒲團又無情世事催人老不覺風光好江南無處不蕭條何處笙歌燈火做元宵承平父老頭顱改就裏襟懐在相逢不忍更論心只向路傍握手共沈吟河傳􅃧效花間體庭院春淺重門深掩􅄫寞東風睡濃起来繡窗花影重嬌慵宿䊋凝淡紅待把睂山臨鏡畵還又罷􅁍放翠簾下畵樓閒樓外山􅀝闌只愁相見難又春晝勌繡輕揎羅袖背􅀝秋千杜鵑年年惱人三月天錦牋空將心事傳小玉偷移箏上鴈絃素斷驚􅁸睡鴛散粉牆西楊桺堤馬嘶誰家遊子歸又戊戌歲暮呉中客樓夜思樓迥人靜􅀨搖燈影夢繞天涯路賒水邉小梅開幾花人家酒旗何處斜客路冰霜驚歲晚情緒懶長是念疎散小溪濵猶有春故人幾時相見頻浣沙溪早春􅋊雪樓臺試晚晴鎻香簾幙釀微酲淺寒燈市有人行别院金刀裁白苧誰家銀燭度瑤箏早春天氣已闗情又金碧圍屏小博山錦籠鸚鵡舊雕闌黃金楊柳弄輕寒翠帳半垂鴛結帶朱門雙掩獸連環東風猶鎻黛眉彎又暮春雜興竹檻雲牕古畵圖煙隄花島小蓬壺晝長人靜鳥相呼元璧光浮銅雀研紫綿香冷博山罏半欹髙枕當人扶又􅀨過池塘緑水生竹隂深處小橋横魚吹翠浪柳花行獨􅀝曲闌魂欲斷沉思傾國句難成忽忽春晚更傷情又春感西子湖頭三月天半篙新漲柳如煙十年不上斷橋􅂳百媚燕􅁎紅錦瑟五花宛馬紫絲鞭秊秊春色暗相牽又丁酉早春試筆柬錢南金􅅍後無詩做好春春光却又惱詩人溪頭舉目暗傷神楊柳官橋人跡絶杏花歌館燒痕新相期何處避兵塵又折花士女圖折得幽花見似人沈吟無語不勝春采香徑裏韈生塵濃緑正迷湘北渚輭紅不入宋東鄰一春幽恨幾囘新一落索新柳陌上東風初轉暗黄猶淺金鞭拂雪記章臺是幾度朱門掩千縷柔絲迎面吹笙人逺粧樓妬冷繡􅄕垂恐悞了雙雙鷰又縷縷鵞黄拂曉弄烟輕裊宐春花外萬􅁝金記朝罷鶯啼早學舞楚􅆎猶小不禁寒悄近来張緒减風流又恐被蛾眉惱南柯子次韻衛立禮春街蹋月門掩黄昬後風銷絳蠟時行春小隊夜參差一曲􅋖音飛上廣寒枝不訪金􅁫客空歌白苧衣畵橋梅影散玻瓈月底婆娑帶得暗香歸减字木蘭花秋思錦屏香斷誰在朱樓吹玉管喚起淒淒不似河橋聽得時雲階月地長憶青燈啼絡緯秋滿間門斷送潘郎痩幾分又崔女郎像紅粧傾國人在蒲東誰畵得玉骨成塵往事流傳恐未眞月明牕戸猶似隔牆花動處夜冷西廂一度魂歸一斷腸又呉江夜泊江頭日暮客子移舟迷去路望斷天涯燈火深邨賣酒家銅駞巷陌荒草寒鵶煙樹隔往事無情􅃇夢依然到五陵清平樂碧桃瑤笙吹罷月满􅋖臺下謌扇半欹羞澹冶一􅀧芳塵不惹臨溪更洗􅋊粧低囘玉洞春光換却當時脂臉從敎惱殺劉郎又梨花緑房深窈踈􅀨黄昏悄門掩東風春又老琪樹生香縹緲一枝晴雪初乾幾囘惆悵東闌料得和雲入夢翠衾夜夜生寒戀繡衾初夏柳花零亂愁滿天又江城啼老杜鵑小庭院雨初過櫂歌聲驚􅁸晝眠微風搖蕩湘簾影浪花斜輕裊􅂐烟問白苧裁成未剪金刀猶憶去年又辛丑元日門前爆竹兒女喧野人家時序尚然盡􅀃衜春來好老來人長怕換秊東風到底無崕岸也􅇻勤相過小園第一是朱顔改縱花開羞挿髩邊又曹􅏊文以庚午歲太初老禪洎雲西居竹二翁燈夕所賦􅃇藳見示求予追和屈􅃌三十餘年三老􅋖去乆矣今㫺之感不能己於言也時至正辛丑上元日重逢元夜心暗驚憶當年諸老放情對芳景張燈火畵堂深簫皷到明烏衣巷口東風在甚而今春艸􅅍生試檢􅀧繁􅂠夢有梅花曾見太平後庭花擬古銅壺更漏殘紅粧春夢闌江上花無語天涯人未還􅀝樓閒月明千里隔江何處山又剰船鸚鵡洲題詩黄鶴樓金谷銅駞夢湘雲楚水愁少年遊好懐依􅃇故人還在不蟻術詞選卷之一
