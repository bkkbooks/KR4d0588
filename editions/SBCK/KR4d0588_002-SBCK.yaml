front:
  text: 蟻術詩􅃟卷之二
  hash: sha256:9a0740dc210536127325a9eaca60c30b08daafe86d899aa480c57a9da2b5e749
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0588_SBCK_002-1a}
body:
  text: 元雲間邵復孺著明新都汪稷校五言長律貞溪寒望物色存荒域人煙散逺郊閑門當野際望眼出林梢水落三秋後天寒十月交草蕪殘畎畝塵没􅃇衡茅日送牛羊下霜催橘柚包溪渾魚漏網樹折鳥傾巢風俗從時改丘園未易抛生涯慙􅀒郭􅀊事乏充庖獨學唯踈嬾羣居適混殽世途多反手友道絶投膠無復懷招隱猶堪賦解嘲興来從目㫁一鴈下塘􅉾至正庚辰􅀊暮大雪同孫果育季野衛立禮三先生分韵賦禁體得天字二十韻肅殺成冬令禎祥兆臘前何人􅀎剪水此夕遂彌天始訝同雲合俄看大地連皇恩敷宇宙春意滿山川氣應豐年早光還太極先灑牕初淅淅入幕已翩翩部婁因成積􅉾堂乆未塡隨風元辟易帶雨却俄延萬室均霑瑞千林競奪鮮獵圍眀燧火僧舍􅁸茶烟髙卧甘茆屋深耕望秫田映書如有約授簡豈無縁金帳家聲舊朱樓樂事傳酣遊曾騕褭低唱總嬋姢尚覺寒罏好猶宜破帽偏雞羣空出色驢背莫爭妍嚴瀨仍髙節程門憶少年陶情憑酒力禁體詫詩篇豈意三陽迫重驚六出全因聽郢中曲欲覓剡溪􅂳太原秦景容肄業胄監以春秋經中大都郷魁有田在海隅至正壬午秋以收稻至雲間錄示近詩和韻復其来意二十韻世宦推三晉聲華自五陵禮隆鄕舉首望重辟雍朋白璧光堪摘青霄世􅀁矜山陽聯㣧胄淮海接雲仍鼓篋曾無忝穿楊豈不勝十年加淬礪萬里會鶱騰俊比峯尖隼清嫌􅁄上蠅依依春月柳炯炯玉壺冰家學多軒冕師模足準繩吟空謝池草業費剡溪藤壯志懷前席雄才薄販繒詞源長倒峡賦壘況髙塍道本關淪喪文應有廢興逺遊方澤國清話及鄰僧鄕味鱸曾膾家書鴈可憑海潮鳴客枕江雨入書燈繼廪饒秔稌羞籩到芡菱雅懷青嶂疊白雲層傾葢真如故盟爐獨未􅀎春秋湏附驥早晚看摶鵬送松江太守楊公正秩滿歸太原裂土邦千里孤城海一陬廟堂嚴遴􅃟牧守慎徵求有美楊夫子眞如漢列侯雄才方趙璧間氣出幷州皁葢聲蕐重銅章禮􅁆優民心懷善教政典邁前脩突兀黃堂改森嚴畵㦸稠阻飢憐接踵移粟慰窮愁䟽鑿江河道經營畎畞秋泮宫仍頌魯多士率歸周一諾䟽㽞獄諸公服逺謀笑談均賦役聲價滿林丘強梗俱潛跡髙明獨運籌拳拳崇祀典翼翼介神休報最還前列掄才孰與儔去思登史􅁽来暮起歌謳雲路追黃鵠春風送􅂵騮棠隂長藹藹柳色自悠悠波暖江淹賦天空庾亮樓未􅀎趨幕府只想逐鼇頭朝野連呉楚恢台􅀡斗牛何因􅀎借宼髙興欲依劉悼趙士弘先生宋宗室良字行與先人同戊子生大族連天水餘芳出浚儀英雄隨氣運浩蕩濟艱危爲庶清門貴傳家舊俗垂人猶羨鍾鼎業不廢弓箕文物終難泯才華竟莫施通家推執友喬木共殘枝先子交承蚤同庚意氣如由来諳契舊比歲數追隨倡和形詩筆􅎋勤接酒巵客樓頻對榻親舍屢彈棋近作溪頭别方爲歳晏期訃来疑入夢心折恨難追殷禮終黃土商歌起繐帷斯文情所感況乃哭吾私錢南金往歲胥會嘉禾􅂵虛觀近聞館於澱湖謝氏經年隔絶􅀉詩問訊二十韻世路多關隔音書絶往還故人長在望良會眇難攀伊昔来茸泖􅊭居共里闤蕳編爭取益詩酒最相關花徑時時埽林荆日日班比年恒異處吾道屬多艱鷗鳥風波急醯鷄宇宙慳洪溪重邂逅玄鬒各斒斕分手仙人宅傾心刺史灣璠璵寧自韞蕭艾孰􅀎刪忽報遷翹館還堪慰旅顔新詩應夢艸短屐快登山孤陋嗟無似驅馳老漸頑廛居惟習嬾浪跡暫投閒澷欲爲雞口何􅀎見豹斑心期忘蹭蹬歲序任循環故里春猶在秋牕月又彎平湖澄水鏡孤阜聳烟鬟目㫁䕷蕪際神勞夢寐間少須携白墮相與岸青綸辛丑早春和顔仲逸新正試筆韻江湖逢獻歲塵土各忘年天際凝煙没林梢霽雪懸山川秖尚爾風物頓蕭然鳥語春聲動魚浮水氣還豐凶􅆓俗讖治忽驗巫篿對酒亡新頌􅆪花失舊妍干戈紛未巳燈火􅄫無傳閱世驚身老題詩讓爾先客居感懷􅀉簡呉野舟四十韻喪亂嗟吾老漂流惜子賢鄕關荒政裏萍梗畏途邊撫事從誰論偷生秖自憐􅅺塗長汨没甲子屢推遷未覺心灰冷何堪室罄懸泰山那畏虎蜀道但聞䳌蕩析彌千里征徭徧一廛故園迷草莽喬木混風煙寳劒深埋匣瑤琴乆絕絃兒童荒問學故舊失周旋生理儒冠誤才情世累牽志乖綿上隱業廢汶陽田蓬島知何地桃源別有天少年違宦達晚景􅀒神仙著屐慚靈運登樓感仲宣意行花漠漠悵望草芊芊物色何曾歇人情實自煎愁添新白髮貧憶舊青氊結舌防漓俗濳形逺逆愆行藏甘屏迹塗抺敢求妍倦欲英􅂠歛窮惟氣節堅不煩詹尹卜雅愛子雲玄夙昔知予者于今獨爾焉家聲昭代重姻好德門聯和璧傷淪沒韋經肯棄􅂢重􅑮驚濩落交慰憫顚連江海孤舟險風霜短褐便􅁭懷還尚爾身世總茫然稍訝頭顱改仍欣禮貌全賞音殊落落屈指特拳拳豈望唐虞際猶攀魏晉前隱淪須隴畝衰謝合林泉黃卷希聞道丹砂覬引年誅茆求杜曲種菊訪斜川春雨漁蓑唱秋風鶴帳眠酒杯從放浪詩卷澷流傳小佇乾坤豁無憂雨露偏浮生多曠達此意豈遷延投老寧無託相親定有縁好焚經世策同貯買山錢邾仲誼博士乆別重見以詩敘聞依韻荅之二十韻客舍窮無事柴扉懶不扃鄕田荒稼穡野􅄿雜參苓喪亂身空老浮沉夢未醒功名嗟曉露故􅃇惻晨星世道紛叢棘流光逐建瓴忘形從槁木託跡任浮萍袞袞欣投筆􅋁寥願授經堪輿更代謝動植總凋零􅄑免題鸚鵡何堪賦鶺鴒暖風仍甕牖凉月尚虛櫺適興紋楸局開懷瓦缶醽風埃便短褐畎畞絶侯鯖緗帙繁新蠧綀囊冷舊螢故人頭盡白重見眼終青媿我淹顔巷傷君憶孔庭乆懷投臭味何啻挹芳馨思繞盟鷗渚羈栖唳鶴汀雲霄迷北海壺嶠隔南􅈚蹇劣顔增甲衰頽目眩丁幾時同辟地萬里快揚舲追悼南金錢文學二十韻弱冠論交道斯文獨賞音瑤環生世族冠帶表儒林學海窮探討詞源極訪尋漸磨期逺業爾汝得同襟文采􅃢瑚樹聲蕐緑綺琴幽蘭湘浦韻喬木謝庭隂才美時無遇情眞世􅀁欽精神元不負道骨竟難任嵇阮風流逺輿犂意氣深半生聯里閈卒嵗盍朋簮夜雨巴山話陽春郢上吟􅍟碁忘寢息沽酒喚登臨漂泊縁生事緘題出素忱風塵多契濶鄕井共浮沉末路傷存没危途異古今空梁迷落月宿草睠遥岑後􅂮遭時變殘生迫歲侵丹心長耿耿霜􅁂益駸駸草記王孫跡梅存處士心空懷掛寳劒那復鑄黃金乙卯立秋日客舍紀懷二十韻時長兒克頴遷于潁水㓜兒克淳沒于濠梁故園凋落􅋊生茫然不􅀎無感於天時也棲遲頻閲歲疎嬾又經秋身老那禁病時危未解憂客居甘屏迹儒術悔無謀撫事浮雲變驚心大火流家山如隔世鄰里盡荒丘杜曲傷遺族咸陽惜壯遊兵塵餘瓦礫烟夢亂汀洲南郭違憑几西風倦􅀝樓幾年春浪濶三泖暮雲稠世道何多梗吾生信􅀂浮悽迷忘夣鹿浩蕩失盟鷗鐵硯功無補丹砂志未酬偷生情惘惘㳤後計悠悠楚室囚仍繫殽陵骨未收音書惟墮淚伏臘轉添愁霜露埋歸轍關河阻去舟孔懷陳俎豆雅志託箕裘悔吝亡先兆行藏豈預籌疎狂猶有興衰謝復何求宇宙還清氣樵漁送白頭蟻術詩選卷之二蟻術詞選卷之二元雲間邵復孺著新都汪稷校令追和趙文敏公舊作十首客有持文敏公手書所作小詞一卷見示者且求作長短句題于後公以承平王孫而嬰世變離黍之悲有不能忘情者故深得騷人意度予生十有四年而公薨每見先輩談公典刑問學如天上人未嘗不神馳夢想昔東坡先生自謂不識范文正公爲平生遺恨其意蓋可想見此􅃃辭翰不忝古人藹然貞元朝士大意以謂擬古之作魏晉以下由來乆矣􅆫以己意追次元韻其於先哲風流文采或可僃髙唐想像之萬一云􅀧絳脣擾擾行藏百年世事悲歌裏歡娯有幾不倦青鞵敝昨夜東風暖透鴛鴦被春歸未故園山水青眼何曽昩又著色苔梅蕚緑仙人􅀌山雪後相逢處􅃇時村路璨璨琅玕樹玉出藍田不受纎塵汙長懐古羅浮風度夢逐么禽去感皇恩憶梅客裏訪南枝幾番愁惱石逕蒼苔倩誰埽江畔人家籬外一枝開早雪中回首處春猶好如此清香寒蠭應飽醉㡌斜􅆪任欹倒而今相見那似向時懐抱舊遊長入夢孤山道江城子水仙凌風翠袖興飄然歩蹮蹮憺忘言淨洗明籹不與世爭妍玉質金相清韻絶端可擬月中仙天寒日暮水雲邊忍相捐意難傳回首珠宫貝闕不勝寒環珮珊珊香冉冉誰敢與􅃲嬋娟蝶戀花鷰子樓邉春意早樓上紅粧何似當時好一自畵睂人去了夢魂暗逐天涯草蹋蹋馬蹄江路杳數盡歸期屈指東風老惆悵一春歡事少幾回月落紗牕曉又湖上雙雙新燕子飛過垂楊認得朱門裏回首向時歌舞地幾番惆悵尋鄰里觸景愁多心似醉􅀝遍闌干目斷春山翠忽見呢喃􅂠屋底等閒牽動離人淚虞美人天台洞口桃開了無奈劉郎老多情何苦歎途窮人與花枝都在暗塵中箇人那日猶癡小簾底秋波􅄅别來幾度見春風應是門前花落水流東又天涯緑遍王孫草魂夢長飛繞長安無復麗人行只有青山依􅃇向人明平泉金谷俱陳迹古路荒苔碧金鞍去去不思歸不道緑牕􅅧處故人非浪淘沙佳麗古神州畵出營邱龍飛鳳舞小瀛洲一自水流東去後多少離愁湖上汎龍舟歌吹悠悠翠華黄屋舊曾遊王氣消沈遺恨在烟水空流太常引蓬壺閬苑景飄蕭青玉案紫鸞簫五彩鳳凰毛記曾覽彤廷奏韶夕陽回首漢家陵闕霜露滿岧嶤説著舊遊遨便想起風流二喬風入松南金寓檇李予容海隅寄此以敘間濶十年心事暗相牽收拾此燈前向來行樂匆匆過到如今想像依然􅂿月幾畨鄰巷看花長共唫船故人一别阻斜川曾記逺遊篇新來我亦長爲客把故園分付寒烟縱使此回相見好懐不似當年又與李仲輿敘舊小溪溪上十年遊酌酒對花謳竹西歌吹曾同賞到如今夢裏􅀭州緑髮潘郎老大近來懶􅀃風流故人握手話綢繆重問舊盟鷗五陵風度猶無恙算閒身底事沉浮莫説烏衣巷口夕陽都是新愁又白仁甫集中木蘭花􅗦結句云二十四橋明月玉人何處吹簫一峯黄先生毎歎賞之一日作清平樂贈一道人末云未試囊中餐玉明朝且入藍田自以爲得意時舉以似人仍索予試作一解時陸彦文夏士賢諸子正有出郭行春之約乃綴此復命且訂其盟先生對客擊節不已當年曾過宋東鄰汗漫􅂿芳塵如今記得歡遊處畵橋橫緑水􅉿􅉿借問酒家何處牧童遥􅃌花邨近來樂事底因循春又過三分百年能幾開懐抱遶天涯芳艸銷魂但願有錢畱客也勝􅀐馬門江月晃重山中秋客牕碧樹天香帶露朱樓翠袖欹寒夜深人醉碧闌干玲瓏影長是隔簾看又見庭前素魄何堪鏡裏朱顔十年一夢此身閒西窗悄詩興頗相闗又辛丑上元前一夕積雪試晴頓有春意小溪之上有張燈于琳館者􅁣然感興以此寫之梅蕚香融霽雲簷牙煖溜懸冰出林幽鳥動春聲元宵近愁裏夢還驚村巷依然素月寒窓秪是青燈難尋遺老問承平南朝事千古獨傷情凭闌人題曹雲西翁贈妓小畵誰寫江南一段秋粧􅀧錢塘蘇小樓樓中多少愁楚山無斷頭古調咲令暮春雙燕雙鷰飛過桺梢不見舊時王謝堂前回首斜陽暮烟暮烟暮烟烟暮芳草落花满路又春水春水薄暮曲闌更倚夕陽江上青山山外行人未還未還未還還未千里相思不􅀉又官渡官渡猶記畵橈去路小憐歌扇誰尋歲歲東風恨深恨深恨深深恨風外落紅幾陣昭君怨擬古江外誰家雙漿激破浪花微響金翠小鴛鴦對悠揚望斷涔陽極浦不是淩波歸處行過畵橋隂又沉吟阮郎歸次韻南金早秋夜思暮雲隔樹􅁸秋隂晚來涼漸深清商瑟瑟和微吟虛堂風露侵鄰燭淡寺鐘沉青綾懐􅃇衾故家風度杳難尋與誰論素心又茂陵多病不勝䆋多情還􅀝樓隔江何處泊􅄐舟有人歌遠逰清興在此生浮老來長是愁西風吹夢白蘋洲􅃇鷗今在不西江月東城夜思古屋􅅧燈弄影嚴城怨角催更掩門欹枕奈微酲巷陌烏聲初靜客裏依然好景年來底事無情嫰寒已透讀書屏􅃇恨不堪提省又賦陶九成甕牖朝光書室土室融融曙色山窗晏晏春眠東風􅛱氣滿壺天依約鏡奩初展晴􅊌茅簷雲彩暖浮􅁓帳香􅈣一枝花影弄嬋娟染就素羅團扇又酒闌與南金徜徉村巷各信意小述故􅃇今成二老歡遊長記當時山中吟􅄚夢中詩多少􅀳人風致但得諸郎俊拔不嫌我輩衰遲􅋊秊飽飰話心期如此差强人意訴哀情夜思滿城鐘鼓夜初寒人靜揜重􅀜驚烏飛繞庭樹月已上闌干微有興澹無歡小盤桓良宵如許香冷金猊萝繞青鸞太常引次韻黄伯陽寒夜玉梅花底􅃇青燈照我􅁂星星寒透逺山屏無夢到春壚湭缾江空歲晏路迷人逺消得幾沉凝一夜玉壺冰又惱得文園病成又次韵伯陽雪中銷金帳底燭花偏仾唱擁嬋娟遙夜酒杯傳幾沈醉瓊林洞天梅花如􅃇竹窓猶在㽞得煮茶煙獨欠釣魚􅂳待歸問羊裘故川菩薩蠻新秋夜􅈵浴罷露坐清江倒浸雲峰巧采菱渡口輕舟小水面晚風香蒹葭搖嫰涼瀟湘人漸老玉珮驚秋早鷗鳥慣忘機背人何處飛又金風簌簌􅃻梧井畵屏耿耿搖燈影屋角月􅂠眀樹頭鳥鵲驚年光流水去青鏡催遲暮便欲泛仙槎迢迢河漢賖又蘇小小像錢塘回首春狼藉湖山依􅃇横金碧何處是兒家粉牆楊柳斜佳期難暗卜檀版傳心曲隨意帶宜男就中􅀿未堪謁金門秋望秋􅀨裏目斷一溪􅈣水隱隱人家疎樹底渡頭燈火􅁸風弄逺汀蒲葦香冷虗堂􅈧几陡覺夜凉侵翠被好懐今有幾又山􅀮􅀮天際暮雲收盡蘋末秋生風漸緊楚江千萬頃江上美人無信換却潘郎雙髩幾夜相思天逺近雁來猶未凖點絳脣暮登新安鎭城樓暮􅀝髙樓太湖西畔青山近鴈邉雲􅉂目力隨天盡落日平蕪􅀧􅀧餘􅇏燼西風緊亂沙成陣故惱雙蓬鬂又荒草寒烟幾年不到新安路􅃇時行處流水迷官渡萬里風埃掇送流年度傷遲暮東馳西􅕽俛仰成今古又秋夜横泖旅牕聽雨有懐故園兩􅁂秋風掩􅀜坐聽黄昬􅀨燈前自語世亂甘清苦􅟵艸愁烟荒􅁍東陵圃歸期阻荆榛滿路投老知何處又髙照菴先生宋朝遺老也甞有長短句云夢遶荆溪蠏肥邨甕滿每誦之自可想見村落秋深景物近見吳埜舟誦而􅇽泳不己有當予心故述卽景且期後約極目平蕪渚寒烟􅊕秋波逺鳬鷖􅊌亂黯黯天涯晚蟹壯蓴香村甕家家滿頻相見幽懐共展剪燭巴山館江城子癸丑歲季夏下澣信歩至漁溪潘氏莊暑雨初霽夕照穿林與呉野舟坐緑樹間適行囊中有松雪翁所書江城子逸態飛越不忍􅇚手因依調口占以􅀉清興古人云人生百年間大要行樂耳卒章以此意爲消憂之勉云踈雲過􅀨漏斜陽樹陰涼晚夙香野老柴門􅅧隱水雲鄉林下草堂塵不到親枕簟懶衣裳故人重見幾星霜髩蒼蒼視茫茫把酒歔欷唯有歎興亡須信百年俱是夢天地濶且徜徉花間訴衷情擬古江路風雨春又去掩重門樓上暮山翠鎻愁痕烟草弄黃昏王孫好懐誰與論暗消魂又晝永人靜花弄影小紅粧斜􅀝畵闌畔看鴛鴦風暖思悠揚横塘桃花流水香盼劉郎又追配曹居竹翁􅃇作深院人勌春去逺緑隂寒宿酒睡初醒凭闌干梅子翠團團小鬟試攀薦雕盤愛微酸鬲溪梅令和南金鴛湖舟中韵幾年不到畵槗西路依俙囘首淡烟殘桺昔遊非篴聲何處悲故人不見萝魂迷草萋萋㡬度􅀝闌欲􅀉􅃇相思相思無盡期玲瓏四犯秋感秋晚登臨漸古驛丹楓初試霜信暝宿河橋長記畵橈乗興清夜載酒呼燈向水面琵琶曾聽想那時席上歌舞多少􅃇家風韻茂陵投老惟多病好情懐怎堪提省西風又動江湖夢歡事今誰領重見縱有後期怕冷袖􅃓腰難認最惱人沙上􅀌鴈落寒成陣暗香呉中顧氏舊時月色亭陸壺天倡始用白石先生元韻以詠黄一峯持卷索賦水邉寒色又怎禁傍晚一聲長笛廢苑日斜玉蕊疎疎未快摘回首江南􅃇夢何處覓黄昬詩筆縱近日雪滿西泠誰解爲移席簫瑟更幽寂記駐馬斷橋頓覺愁積􅀝風暗泣離黍殘碑尚追憶絶艶無人管領潮自落呉山横碧便想像風景好可能再得埽花遊春晚次南金韻柳花巷陌悄不見銅駞采香芳侣畵樓在否幾東風怨笛凭闌日暮一片閒情尚繞斜陽錦樹黯無語記花外馬嘶曾送人去風景長暗度奈好萝微茫艶懐清苦後期已誤剪燭花未卜故人來處水驛相逢待􅀃當年恨賦􅀉愁與鳳城東舊時行旅氐州第一丙申初冬次錢素菴韻江國初寒雲外鴈過懐人烟浪千頃短䇿行吟荒臺延佇斜日依然照影鷗鳥橋邉幾負了扁舟清興􅃇約蹉跎新詩冷落怎堪提省故里年來歡事迥算何似向時風景􅀝馬朱扉調箏翠袖一向新盟冷但沈思遊宴處紅樓外柳條相暎不見君來待重尋山隂夜艇木蘭花􅗦蘇昌齡過曹雲翁貞溪故居賦詞致慕藺之感幼文來致其意求次韵入卷訪溪翁隱處渾不减輞川西指花下吟牕松間畵壁名筆交題經行向來坊陌藹茂林脩竹與雲齊丹竈遺基彷彿墨池流水悽迷青藜乗興蹋春仙路入桃蹊歎前輩風流故家文物往夢難提那能九原重􅁸向三生石上縱揮犀回首不勝魂斷夕陽芳草萋萋長亭怨􅗦楊花正愁怕曲江雲盡轉首隋堤尚留芳景客路相逢滿身香影動離恨緑牕深窈渾不􅀉天涯信暗憶那回時向馬足車輪長是隨趂問春心何在一點沾􅅺無凖潘郎怕老又禁得雪添雙髩悵日暮靜掩長門且頻囑東風休緊謾猶記章臺簾捲日長人困渡江雲庚戌臘月九日與邾仲義同往江隂是夕泊舟無錫之髙橋亂後荒寒茅葦彌望朔吹乍靜山氣乍昏復明􅁸與仲義登橋縱目霜月遍野情懐恍然口占紀行求仲義印可朔風吹破㡌江空歲晚客路正冰霜暮鵶歸未了指􅀧旗亭弭櫂宿河梁荒烟亂草試小立目送斜陽尋􅃇遊恍然如夢展轉意難忘堪傷山陽夜笛水面琵琶記當年曾賞嗟老來風埃憔悴身世微茫今宵到此知何處對冷月清興猶狂愁未了一聲漁笛滄浪八聲甘州次錢思復懐錢塘􅃇遊韻歎前朝勝地正離離荒草不勝春縱湖山尚好泉乾虎跡井閟龍鱗多少王侯第宅遊賞太平身車馬經行處錦繡紛紜夢裏曲江宫殿自長安日逺深鎻愁雲念牆頭楊桺憔悴向誰顰又東風鳥啼花落黯黄昏胡􅀐滿城塵當時事不堪回首重問陳人法曲獻仙音􅀉壽雲西老人時呉興張石隱武林謝長源㑹稽胡伯大海隅王子章皆留老人賔館三月二十八日也榖􅀨晞晴柳風吹暖春在緑隂深處青鳥傳書羽􅋖清道天香暗滿牕户凖擬問長生路桃花幾千樹黯凝竚看斑衣近來得意雲路迥千里易成濶歩銅狄儘摩挲任髙堂暮景容與見􅀃西園有佳賓釃酒同賦恨牡丹花下此際不陪罇爼滿江紅丙午重陽前二日雨霽泗涇􅀝闌望九山雲􅃈呉山重陽近滿城風􅀨層樓外摩挲病眼尚堪延佇采蘜有誰忘世慮催租底事妨詩句縱烏巾潦倒不禁秋猶能賦村隱隱牛羊路烟冉冉蒹葭渡是幾畨興廢幾畨今古世亂可堪逢節序身閒猶有餘風度且憑髙呼酒發狂歌愁何處又己酉九日􅀨中家居憶夏士安頥貞䝉亨􅅩姪唐元望元泰元􅊼昆季六人皆常年同萸菊者一載之間俱罹患難各天一方信筆紀懐有不勝情者矣風􅀨重陽憑誰問故人消息記當日承平節序佩環賔席處處相逢開口笑年年不負登山􅄚是幾畨扶醉揷黄花烏巾側詩酒㑹成陳迹山水趣今誰識奈無情世故轉頭今昔冰雪闗河勞夢寐芝蘭玉樹埋荆􅁄對西風愁殺白頭人長相憶洞仙歌賦孫明􅅩水光山色舟紅塵海裏好風光誰有輸與滄浪釣竿手信翩然一葦目斷空􅄥烟草外歷歷湘雲楚岫􅓽隨春浪去路入桃源肻爲繁􅂠暫回首歲晚若歸來縱鷗鷺忘機莫繫纜漢南楊柳好乗興凌風訪蓬萊爲􅀃與麻姑海桑依􅃇江城梅花引己丣除夕燈前兒女小團圞歲將闌夜將殘一度逢春一度减朱顔明日東風三十二又􅄈得二毛侵鬂底斑世間世間行路難身世閒天地寛往事往事恨未了長恨儒冠爆竹聲中春又到柴闗一任黃塵門外擾且留取􅃇梅花􅍦自看又陸壺天錢素菴二老相㑹皆有感懐承平故家之作索予次韻而不及當道作者葢俯念艸木之味也五陵春色􅃇曾游翠娥謳錦纏頭花落花開不信有幷州淺碧障泥紅叱撥柳橋外滿東風無􅀧愁近來近來䨇髩秋心漸收情尚畱底事底事遽如許身世沉浮何况年華長向鏡中羞􅂊見那時簾外月便想起醉吹簫罨畵樓祝英臺近和雲西老人秋懐韻暮天雲深夜􅀨幽興到何許風拍踈簾燈影逗牕户自從􅊕宿河橋露聽江笛乆不記􅃇遊湘楚正無緒可奈滿目清商蕭蕭五陵樹斜掩屏山膓斷庾郎賦幾回思遶蘋花夢尋蘭棹怕驚􅁸故溪鷗鷺紅林檎近水村冬景次錢素庵韻雲樹風初勁霧牕晴尚慳鴈落野塘􅊕鶴鳴水村寒重來尋梅逕裏漸喜嫰蕚堪看向日院宇荒閒香冷􅃇銅盤几格横素帙屏壁淡烟巒􅃓腰冷䄂多情維憶前歡但温存羔酒留連獸炭暮江欲雪年又殘又冬雨晚晴次謝士英韻山晚牛羊下野荒鳧鴈肥雨脚度江逺日光映林微􅅺深何堪縱歩􅀝杖謾立苔磯望極浦口雲歸寒氣透征衣斷冰隨浪檝斜竹偃風扉江空歲暮村深人跡還稀待霜橋梅破茅堂酒暖放􅂳速客延暉春草碧次韻素菴遣懐更籌圖子宣和譜流落到如今空懐古江南荒草寒􅈣前代風流共誰語猶有賦騷人迷湘浦烏衣巷口斜陽愔愔院宇玉樹後庭花誰能舉五陵殘夢依俙回首天涯歎行旅馬上杜鵑啼愁如􅀨隔浦蓮水檻晚晴冰紈光暎素手竹簟醒􅋊酒滿院梅風􅁸踈雲薄斜陽漏蘭棹歸去後詩人痩夢繞瀟湘柳屢回首開簾傍晚烟中微見青岫滄浪逺興爲問白鷗知否十里平湖縱望乆凉透江蓮香度踈牖卷二终
