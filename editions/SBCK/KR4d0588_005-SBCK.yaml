front:
  text: 蟻術詩選卷之五
  hash: sha256:11b7f84eb9a96dce42b482cea9126426afa1d1155917d6b5104209c6a5353658
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0588_SBCK_005-1a}
body:
  text: 元雲間邵復孺著明新都汪稷校七言排律汪太守夀席同諸老分韻得蘭字九仙山下梅開早生意齋前竹耐寒揷架書多呈琬琰寫經牕靜長琅玕晝閑風滿談玄麈春暖庭生結佩蘭老子胡牀饒􅇣興郞君綵戲有餘歡對棋不勌仙柯爛醉草從教墨沼乾門外塵氛俱辟易壷中歲月儘盤桓已聞北闕徵黃霸未許東山老謝安南極景星明永夜鶴書欲下五雲端􅀉孤山和靖祠堂葉掌祠聞道髙居絶世塵湖光十里碧􅉿􅉿向来東閣梅花好近日西山爽氣新學士港春窈窕先生􅃁石嶙峋共欣當代文風盛不使咸平勝迹湮結屋數楹鋪俎豆種花千樹闢荊榛明時汙簡書髙節吉日生芻屈搢紳緑􅄠掌祠談笑逸畵􅂳載客徃来頻新亭風景應回首故國江山亦愴神蠟屐一䨥吟踏雪銅錢三百醉行春家童放鶴青㝠上道士籠鵞緑水濵清宴有時呼錦瑟髙歌長是岸烏巾江城握手窮冬迫客舍論心古意眞一自北風吹去斾幾畨南浦􅃸離人喜從歸鴈曾傳信咲指盟鷗欲問津谷口犂鉏仍汨沒山隂觴咏屢因循生涯自信溝中斷意氣深期席上珍安淂鳴鞭追騕褭尚􅀎肆筆對麒麟黃昏踈影應無恙白雪陽春莫效顰絳帳談經終有約青藜照坐定相親西泠渡口重維櫂第二橋東擬卜鄰曹安雅翁新營瀼東莊小隱清溪多歲月舊家喬木老風烟雲寒髙卧崑山屋雨暖深畊瀼水田洛社衣冠無俗習善和書籍有人傳飄蕭華髮三千丈􅀉傲清時六十年著述自堪當野史歸休曾不念塵縁春生栗里􅀟吟屐秋入呉淞一釣􅂳茶盌通仙揮麈外酒瓢㽞客剪燈前乆諳時論同堅白自許風情合太玄白璧一䨥光炯炯朱絃三歎舞蹮蹮庭深玉樹孫枝長籬遶黃花晚節妍氣味本同瓜圃瓞歳寒猶比竹林賢想應出處人同世好在鴻濛太極先蟻術詩選卷之五
